AWSTemplateFormatVersion: '2010-09-09'
Description: >
  OutageShield AI - Bedrock Agent Stack
  Autonomous incident investigation agent with 6 Action Group tools:
  searchIncidentHistory, searchLogs, getRunbook, checkDeployments, searchTraces (X-Ray), checkConfigDrift (AWS Config)
  Anti-hallucination design: extracts raw tool results from trace, ignores LLM text.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  RetentionDays:
    Type: Number
    Default: 14

Resources:

  # ─────────────────────────────────────────────────────────────────────────────
  # Bedrock Agent Execution Role
  # ─────────────────────────────────────────────────────────────────────────────
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub outageshield-investigator-agent-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAgentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-3-haiku-20240307-v1:0
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt AgentActionLambda.Arn

  # ─────────────────────────────────────────────────────────────────────────────
  # Bedrock Agent — Incident Investigator (6 Tools)
  # ─────────────────────────────────────────────────────────────────────────────
  IncidentInvestigatorAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Sub outageshield-investigator-${Environment}
      AgentResourceRoleArn: !GetAtt BedrockAgentRole.Arn
      FoundationModel: anthropic.claude-3-haiku-20240307-v1:0
      IdleSessionTTLInSeconds: 600
      Instruction: |
        You are an expert Site Reliability Engineer (SRE) investigating cloud infrastructure incidents.
        Your job is to autonomously investigate incidents by calling ALL 6 tools in order:

        1. searchIncidentHistory - Find similar past incidents on the same service
        2. searchLogs - Query OpenSearch logs for error patterns and anomalies
        3. getRunbook - Look up remediation runbook for the alarm type
        4. checkDeployments - Check recent deployments and configuration changes
        5. searchTraces - Query X-Ray for latency and error traces
        6. checkConfigDrift - Check AWS Config for compliance issues and drift

        CRITICAL: You MUST call ALL 6 tools for every investigation. Do not skip any tool.
        The output from each tool will be extracted and formatted separately.
        Your text response will be ignored - only the tool results matter.
      Description: !Sub OutageShield AI Incident Investigator Agent with 6 tools (${Environment})
      ActionGroups:
        - ActionGroupName: IncidentInvestigationTools
          ActionGroupExecutor:
            Lambda: !GetAtt AgentActionLambda.Arn
          Description: 6 tools for comprehensive incident investigation
          ApiSchema:
            Payload: |
              {
                "openapi": "3.0.0",
                "info": {
                  "title": "OutageShield Investigation Tools",
                  "version": "2.0.0",
                  "description": "6 tools for comprehensive incident investigation"
                },
                "paths": {
                  "/search-incidents": {
                    "get": {
                      "operationId": "searchIncidentHistory",
                      "description": "Search past incidents for a service to find patterns and similar issues",
                      "parameters": [
                        {"name": "service", "in": "path", "required": true, "schema": {"type": "string"}, "description": "Service name to search incidents for"}
                      ],
                      "responses": {"200": {"description": "List of past incidents"}}
                    }
                  },
                  "/search-logs": {
                    "get": {
                      "operationId": "searchLogs",
                      "description": "Search OpenSearch logs for error patterns and anomalies",
                      "parameters": [
                        {"name": "service", "in": "path", "required": true, "schema": {"type": "string"}, "description": "Service name"},
                        {"name": "time_range", "in": "path", "required": true, "schema": {"type": "string"}, "description": "Time range (1h, 6h, 24h)"}
                      ],
                      "responses": {"200": {"description": "Log entries and patterns"}}
                    }
                  },
                  "/get-runbook": {
                    "get": {
                      "operationId": "getRunbook",
                      "description": "Look up remediation runbook for a specific alarm type",
                      "parameters": [
                        {"name": "service", "in": "path", "required": true, "schema": {"type": "string"}, "description": "Service name"},
                        {"name": "alarm_type", "in": "path", "required": true, "schema": {"type": "string"}, "description": "Alarm type (HighLatency, High5xxRate, HighCPU, MemoryPressure)"}
                      ],
                      "responses": {"200": {"description": "Runbook with remediation steps"}}
                    }
                  },
                  "/check-deployments": {
                    "get": {
                      "operationId": "checkDeployments",
                      "description": "Check recent deployments and configuration changes",
                      "parameters": [
                        {"name": "service", "in": "path", "required": true, "schema": {"type": "string"}, "description": "Service name"}
                      ],
                      "responses": {"200": {"description": "Recent deployments and config changes"}}
                    }
                  },
                  "/search-traces": {
                    "get": {
                      "operationId": "searchTraces",
                      "description": "Search X-Ray traces for latency and error patterns",
                      "parameters": [
                        {"name": "service", "in": "path", "required": true, "schema": {"type": "string"}, "description": "Service name"},
                        {"name": "time_range", "in": "path", "required": true, "schema": {"type": "string"}, "description": "Time range (1h, 6h)"}
                      ],
                      "responses": {"200": {"description": "X-Ray traces, service stats, and insights"}}
                    }
                  },
                  "/check-config-drift": {
                    "get": {
                      "operationId": "checkConfigDrift",
                      "description": "Check AWS Config for compliance issues and configuration drift",
                      "parameters": [
                        {"name": "service", "in": "path", "required": true, "schema": {"type": "string"}, "description": "Service name"}
                      ],
                      "responses": {"200": {"description": "Non-compliant resources and recent config changes"}}
                    }
                  }
                }
              }

  # ─────────────────────────────────────────────────────────────────────────────
  # Agent Action Group Lambda — 6 Investigation Tools
  # Features: X-Ray traces, AWS Config drift, sample data fallback for demo
  # ─────────────────────────────────────────────────────────────────────────────
  AgentActionLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub outageshield-agent-action-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AgentActionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:Query
                  - dynamodb:GetItem
                Resource:
                  - !ImportValue
                    Fn::Sub: outageshield-storage-${Environment}-IncidentsTableArn
                  - !ImportValue
                    Fn::Sub: outageshield-storage-${Environment}-EventsTableArn
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/outageshield-runbooks-${Environment}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/outageshield-deployments-${Environment}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/outageshield-deployments-${Environment}/index/*
              - Effect: Allow
                Action:
                  - aoss:APIAccessAll
                Resource: '*'
              - Effect: Allow
                Action:
                  - xray:GetTraceSummaries
                  - xray:BatchGetTraces
                  - xray:GetServiceGraph
                  - xray:GetInsightSummaries
                Resource: '*'
              - Effect: Allow
                Action:
                  - config:DescribeComplianceByResource
                  - config:GetComplianceDetailsByResource
                  - config:SelectResourceConfig
                  - config:DescribeConfigurationRecorderStatus
                Resource: '*'

  AgentActionLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub outageshield-agent-actions-${Environment}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt AgentActionLambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      Layers:
        - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:layer:opensearch-py:1
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          INCIDENTS_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-IncidentsTableName
          EVENTS_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-EventsTableName
          RUNBOOKS_TABLE: !Sub outageshield-runbooks-${Environment}
          DEPLOYMENTS_TABLE: !Sub outageshield-deployments-${Environment}
          OPENSEARCH_ENDPOINT: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-OpenSearchEndpoint
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          import hashlib
          from datetime import datetime, timedelta, timezone
          from boto3.dynamodb.conditions import Attr, Key

          dynamodb = boto3.resource('dynamodb')
          xray = boto3.client('xray')
          config_client = boto3.client('config')

          INCIDENTS_TABLE = os.environ.get('INCIDENTS_TABLE', 'outageshield-incidents-dev')
          EVENTS_TABLE = os.environ.get('EVENTS_TABLE', 'outageshield-events-dev')
          RUNBOOKS_TABLE = os.environ.get('RUNBOOKS_TABLE', 'outageshield-runbooks-dev')
          DEPLOYMENTS_TABLE = os.environ.get('DEPLOYMENTS_TABLE', 'outageshield-deployments-dev')
          OPENSEARCH_ENDPOINT = os.environ.get('OPENSEARCH_ENDPOINT', '')

          def lambda_handler(event, context):
              print(f"Agent action event: {json.dumps(event)}")
              action_group = event.get('actionGroup', '')
              api_path = event.get('apiPath', '')
              parameters = event.get('parameters', [])
              params = {p['name']: p['value'] for p in parameters}

              if api_path == '/search-incidents':
                  result = search_incident_history(params)
              elif api_path == '/search-logs':
                  result = search_logs(params)
              elif api_path == '/get-runbook':
                  result = get_runbook(params)
              elif api_path == '/check-deployments':
                  result = check_deployments(params)
              elif api_path == '/search-traces':
                  result = search_traces(params)
              elif api_path == '/check-config-drift':
                  result = check_config_drift(params)
              else:
                  result = {'error': f'Unknown action: {api_path}'}

              return {
                  'messageVersion': '1.0',
                  'response': {
                      'actionGroup': action_group,
                      'apiPath': api_path,
                      'httpMethod': 'GET',
                      'httpStatusCode': 200,
                      'responseBody': {'application/json': {'body': json.dumps(result)}}
                  }
              }

          def search_incident_history(params):
              service = params.get('service', '')
              current_incident_id = params.get('current_incident_id', '')
              table = dynamodb.Table(INCIDENTS_TABLE)
              response = table.scan(FilterExpression=Attr('service').eq(service), Limit=20)
              incidents = response.get('Items', [])
              incidents_sorted = sorted(incidents, key=lambda x: x.get('created_at', ''), reverse=True)
              past_incidents = [i for i in incidents_sorted if i.get('incident_id') != current_incident_id][:5]
              return {
                  'service': service,
                  'total_past_incidents': len(past_incidents),
                  'incidents': [{'incident_id': inc.get('incident_id', ''), 'title': inc.get('title', ''), 'root_cause': inc.get('root_cause', 'Unknown'), 'severity': int(inc.get('severity_score', 3)), 'status': inc.get('status', 'Unknown'), 'created_at': inc.get('created_at', '')} for inc in past_incidents]
              }

          def search_logs(params):
              service = params.get('service', '')
              time_range = params.get('time_range', '6h')
              results = []
              data_source = 'No data'
              if OPENSEARCH_ENDPOINT:
                  try:
                      from opensearchpy import OpenSearch, RequestsHttpConnection, AWSV4SignerAuth
                      host = OPENSEARCH_ENDPOINT.replace('https://', '')
                      credentials = boto3.Session().get_credentials()
                      auth = AWSV4SignerAuth(credentials, 'us-east-1', 'aoss')
                      client = OpenSearch(hosts=[{'host': host, 'port': 443}], http_auth=auth, use_ssl=True, verify_certs=True, connection_class=RequestsHttpConnection)
                      query = {"query": {"bool": {"should": [{"match": {"service": {"query": service, "boost": 3}}}, {"match": {"alarm_name": {"query": service, "boost": 2}}}, {"match": {"message": {"query": service}}}], "minimum_should_match": 1}}, "size": 10, "sort": [{"_score": {"order": "desc"}}, {"timestamp": {"order": "desc"}}]}
                      response = client.search(index='outageshield-logs', body=query)
                      hits = response.get('hits', {}).get('hits', [])
                      if hits:
                          results = [{'alarm_name': hit['_source'].get('alarm_name', ''), 'severity': hit['_source'].get('severity', 'unknown'), 'message': hit['_source'].get('message', ''), 'timestamp': hit['_source'].get('timestamp', ''), 'root_cause': hit['_source'].get('root_cause', '')} for hit in hits]
                          data_source = 'OpenSearch'
                  except Exception as e:
                      data_source = f'OpenSearch error: {str(e)[:50]}'
              return {'service': service, 'time_range': time_range, 'data_source': data_source, 'total_log_entries': len(results), 'patterns': results}

          def get_runbook(params):
              service = params.get('service', '')
              alarm_type = params.get('alarm_type', '')
              table = dynamodb.Table(RUNBOOKS_TABLE)
              alarm_type_prefix = alarm_type.split('-')[0] if '-' in alarm_type else alarm_type
              known_runbooks = ['HighLatency', 'High5xxRate', 'HighCPU', 'MemoryPressure', 'ConnectionPool', 'QueueBacklog', 'AuthFailures', 'CacheMissRate', 'DiskUsage']
              keys_to_try = [alarm_type, alarm_type_prefix]
              for rb in known_runbooks:
                  if rb.lower() in alarm_type.lower():
                      keys_to_try.append(rb)
              seen = set()
              keys_to_try = [k for k in keys_to_try if not (k in seen or seen.add(k))]
              for key in keys_to_try:
                  try:
                      response = table.get_item(Key={'runbook_id': key})
                      item = response.get('Item')
                      if item:
                          return {'service': service, 'alarm_type': alarm_type, 'matched_runbook_id': key, 'found': True, 'runbook': {'title': item.get('title', ''), 'description': item.get('description', ''), 'steps': item.get('steps', []), 'category': item.get('category', 'manual_intervention'), 'estimated_ttr': item.get('estimated_ttr', 'Unknown')}}
                  except Exception as e:
                      print(f"Runbook lookup failed for key {key}: {e}")
              return {'service': service, 'alarm_type': alarm_type, 'found': False, 'runbook': None}

          def check_deployments(params):
              service = params.get('service', '')
              table = dynamodb.Table(DEPLOYMENTS_TABLE)
              now = datetime.utcnow()
              cutoff = (now - timedelta(hours=24)).strftime('%Y-%m-%dT%H:%M:%S')
              deployments = []
              config_changes = []
              try:
                  response = table.query(IndexName='service-timestamp-index', KeyConditionExpression=Key('service').eq(service) & Key('timestamp').gte(cutoff), ScanIndexForward=False, Limit=10)
                  items = response.get('Items', [])
                  for item in items:
                      record_type = item.get('type', 'deployment')
                      if record_type == 'config_change':
                          config_changes.append({'parameter': item.get('parameter', ''), 'old_value': item.get('old_value', ''), 'new_value': item.get('new_value', ''), 'timestamp': item.get('timestamp', ''), 'reason': item.get('reason', '')})
                      else:
                          deployments.append({'deployment_id': item.get('deployment_id', ''), 'version': item.get('version', ''), 'timestamp': item.get('timestamp', ''), 'status': item.get('status', 'unknown'), 'changes': item.get('changes', '')})
              except Exception as e:
                  print(f"Deployment query failed: {e}")
              return {'service': service, 'total_deployments': len(deployments), 'total_config_changes': len(config_changes), 'deployments': deployments, 'config_changes': config_changes}

          def generate_sample_xray_data(service):
              seed = hashlib.md5(service.encode()).hexdigest()[:8]
              now = datetime.now(timezone.utc)
              error_traces = [{'trace_id': f'1-{seed}01-{seed}abcdef123456789012', 'duration_ms': 2340, 'has_error': True, 'has_fault': False, 'http_status': 500, 'http_url': f'/api/{service}/process', 'error_type': 'Internal Server Error - Database connection timeout'}, {'trace_id': f'1-{seed}02-{seed}fedcba987654321098', 'duration_ms': 1850, 'has_error': True, 'has_fault': True, 'http_status': 503, 'http_url': f'/api/{service}/health', 'error_type': 'Service Unavailable - Downstream dependency failure'}]
              slow_traces = [{'trace_id': f'1-{seed}04-{seed}aabbccdd11223344', 'duration_ms': 4500, 'response_time_ms': 4200, 'http_url': f'/api/{service}/list', 'bottleneck': 'DynamoDB scan operation'}, {'trace_id': f'1-{seed}05-{seed}55667788aabbccdd', 'duration_ms': 3800, 'response_time_ms': 3500, 'http_url': f'/api/{service}/export', 'bottleneck': 'S3 multipart upload'}]
              service_stats = {'name': service, 'type': 'AWS::Lambda::Function', 'total_requests': 15420, 'ok_count': 14850, 'error_count': 420, 'fault_count': 150, 'avg_response_time_ms': 245, 'error_rate_percent': 2.7, 'p99_latency_ms': 1850}
              insights = [{'insight_id': f'insight-{seed}-001', 'category': 'FAULT', 'state': 'ACTIVE', 'summary': f'Increased error rate detected in {service}. Error rate increased from 0.5% to 2.7% in the last hour.', 'root_cause_service': f'{service}-database', 'impact': 'HIGH'}]
              return {'error_traces': error_traces, 'slow_traces': slow_traces, 'service_stats': service_stats, 'insights': insights}

          def search_traces(params):
              service = params.get('service', '')
              time_range = params.get('time_range', '1h')
              hours = int(time_range.replace('h', '')) if 'h' in time_range else 1
              end_time = datetime.now(timezone.utc)
              start_time = end_time - timedelta(hours=hours)
              results = {'service': service, 'time_range': time_range, 'error_traces': [], 'slow_traces': [], 'service_stats': {}, 'insights': [], 'data_source': 'AWS X-Ray'}
              has_real_data = False
              try:
                  filter_expr = f'service(id(name: "{service}"))'
                  try:
                      error_response = xray.get_trace_summaries(StartTime=start_time, EndTime=end_time, FilterExpression=f'{filter_expr} AND error', Sampling=True)
                      for t in error_response.get('TraceSummaries', [])[:5]:
                          has_real_data = True
                          results['error_traces'].append({'trace_id': t.get('Id', ''), 'duration_ms': int(t.get('Duration', 0) * 1000), 'has_error': t.get('HasError', False), 'has_fault': t.get('HasFault', False), 'http_status': t.get('Http', {}).get('HttpStatus', 0), 'http_url': t.get('Http', {}).get('HttpURL', '')[:100]})
                  except Exception as e:
                      print(f"Error traces query failed: {e}")
                  try:
                      slow_response = xray.get_trace_summaries(StartTime=start_time, EndTime=end_time, FilterExpression=f'{filter_expr} AND responsetime > 1', Sampling=True)
                      for t in slow_response.get('TraceSummaries', [])[:5]:
                          has_real_data = True
                          results['slow_traces'].append({'trace_id': t.get('Id', ''), 'duration_ms': int(t.get('Duration', 0) * 1000), 'response_time_ms': int(t.get('ResponseTime', 0) * 1000), 'http_url': t.get('Http', {}).get('HttpURL', '')[:100]})
                  except Exception as e:
                      print(f"Slow traces query failed: {e}")
                  try:
                      graph_response = xray.get_service_graph(StartTime=start_time, EndTime=end_time)
                      for svc in graph_response.get('Services', []):
                          if service.lower() in svc.get('Name', '').lower():
                              has_real_data = True
                              summary = svc.get('SummaryStatistics', {})
                              total = summary.get('TotalCount', 0)
                              results['service_stats'] = {'name': svc.get('Name', ''), 'type': svc.get('Type', ''), 'total_requests': total, 'ok_count': summary.get('OkCount', 0), 'error_count': summary.get('ErrorStatistics', {}).get('TotalCount', 0), 'fault_count': summary.get('FaultStatistics', {}).get('TotalCount', 0), 'avg_response_time_ms': int((summary.get('TotalResponseTime', 0) / max(total, 1)) * 1000)}
                              break
                  except Exception as e:
                      print(f"Service graph query failed: {e}")
                  if not has_real_data:
                      sample_data = generate_sample_xray_data(service)
                      results['error_traces'] = sample_data['error_traces']
                      results['slow_traces'] = sample_data['slow_traces']
                      results['service_stats'] = sample_data['service_stats']
                      results['insights'] = sample_data['insights']
                      results['data_source'] = 'Sample Data (X-Ray not enabled for this service)'
                  results['summary'] = {'total_error_traces': len(results['error_traces']), 'total_slow_traces': len(results['slow_traces']), 'total_insights': len(results['insights']), 'service_found': bool(results['service_stats']), 'is_sample_data': not has_real_data}
              except Exception as e:
                  sample_data = generate_sample_xray_data(service)
                  results['error_traces'] = sample_data['error_traces']
                  results['slow_traces'] = sample_data['slow_traces']
                  results['service_stats'] = sample_data['service_stats']
                  results['insights'] = sample_data['insights']
                  results['data_source'] = 'Sample Data (X-Ray query failed)'
                  results['summary'] = {'total_error_traces': len(results['error_traces']), 'total_slow_traces': len(results['slow_traces']), 'total_insights': len(results['insights']), 'service_found': True, 'is_sample_data': True}
              return results

          def generate_sample_config_data(service):
              seed = hashlib.md5(service.encode()).hexdigest()[:8]
              now = datetime.now(timezone.utc)
              non_compliant_resources = [{'resource_id': f'{service}-lambda-function', 'resource_type': 'AWS::Lambda::Function', 'compliance_status': 'NON_COMPLIANT', 'violations': [{'rule_name': 'lambda-function-public-access-prohibited', 'annotation': 'Lambda function has resource-based policy allowing public access'}]}, {'resource_id': f'{service}-security-group', 'resource_type': 'AWS::EC2::SecurityGroup', 'compliance_status': 'NON_COMPLIANT', 'violations': [{'rule_name': 'restricted-ssh', 'annotation': 'Security group allows SSH access from 0.0.0.0/0'}]}]
              recent_changes = [{'resource_id': f'{service}-lambda-function', 'resource_type': 'AWS::Lambda::Function', 'capture_time': (now - timedelta(hours=2)).isoformat(), 'status': 'ResourceDiscovered', 'change_type': 'Memory increased from 512MB to 1024MB', 'changed_by': 'deployment-pipeline'}, {'resource_id': f'{service}-security-group', 'resource_type': 'AWS::EC2::SecurityGroup', 'capture_time': (now - timedelta(hours=4)).isoformat(), 'status': 'ResourceDiscovered', 'change_type': 'Inbound rule added: port 443 from 0.0.0.0/0', 'changed_by': 'manual-console-change'}]
              return {'non_compliant_resources': non_compliant_resources, 'recent_changes': recent_changes}

          def check_config_drift(params):
              service = params.get('service', '')
              results = {'service': service, 'non_compliant_resources': [], 'recent_changes': [], 'compliance_summary': {}, 'data_source': 'AWS Config'}
              has_real_data = False
              config_enabled = False
              try:
                  recorder_status = config_client.describe_configuration_recorder_status()
                  recorders = recorder_status.get('ConfigurationRecordersStatus', [])
                  config_enabled = any(r.get('recording', False) for r in recorders)
                  if config_enabled:
                      try:
                          compliance_response = config_client.describe_compliance_by_resource(ComplianceTypes=['NON_COMPLIANT'], Limit=25)
                          for resource in compliance_response.get('ComplianceByResources', []):
                              resource_id = resource.get('ResourceId', '')
                              if not service or service.lower() in resource_id.lower():
                                  has_real_data = True
                                  results['non_compliant_resources'].append({'resource_id': resource_id, 'resource_type': resource.get('ResourceType', ''), 'compliance_status': 'NON_COMPLIANT'})
                      except Exception as e:
                          print(f"Compliance query failed: {e}")
                  if not has_real_data:
                      sample_data = generate_sample_config_data(service)
                      results['non_compliant_resources'] = sample_data['non_compliant_resources']
                      results['recent_changes'] = sample_data['recent_changes']
                      results['data_source'] = 'Sample Data (AWS Config not enabled)' if not config_enabled else 'Sample Data (No Config data for this service)'
                  results['summary'] = {'config_enabled': config_enabled, 'total_non_compliant': len(results['non_compliant_resources']), 'total_changes': len(results['recent_changes']), 'is_sample_data': not has_real_data}
              except Exception as e:
                  sample_data = generate_sample_config_data(service)
                  results['non_compliant_resources'] = sample_data['non_compliant_resources']
                  results['recent_changes'] = sample_data['recent_changes']
                  results['data_source'] = 'Sample Data (AWS Config query failed)'
                  results['summary'] = {'config_enabled': False, 'total_non_compliant': len(results['non_compliant_resources']), 'total_changes': len(results['recent_changes']), 'is_sample_data': True}
              return results

  # ─────────────────────────────────────────────────────────────────────────────
  # Lambda Permission for Bedrock Agent to invoke
  # ─────────────────────────────────────────────────────────────────────────────
  AgentActionLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AgentActionLambda.Arn
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com
      SourceArn: !GetAtt IncidentInvestigatorAgent.AgentArn

  # ─────────────────────────────────────────────────────────────────────────────
  # Log Group
  # ─────────────────────────────────────────────────────────────────────────────
  AgentActionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/outageshield-agent-actions-${Environment}
      RetentionInDays: !Ref RetentionDays

  # ─────────────────────────────────────────────────────────────────────────────
  # Agent Invoker Lambda — Anti-Hallucination Design
  # Extracts RAW tool results from Bedrock Agent trace, ignores LLM text
  # ─────────────────────────────────────────────────────────────────────────────
  AgentInvokerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub outageshield-agent-invoker-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AgentInvokerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                Resource: '*'
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                Resource:
                  - !ImportValue
                    Fn::Sub: outageshield-storage-${Environment}-IncidentsTableArn

  AgentInvokerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub outageshield-agent-invoker-${Environment}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt AgentInvokerRole.Arn
      Timeout: 120
      MemorySize: 256
      Environment:
        Variables:
          AGENT_ID: !GetAtt IncidentInvestigatorAgent.AgentId
          AGENT_ALIAS_ID: TSTALIASID
          INCIDENTS_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-IncidentsTableName
          RUNBOOKS_TABLE: !Sub outageshield-runbooks-${Environment}
          OPENSEARCH_ENDPOINT: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-OpenSearchEndpoint
          DEPLOYMENTS_TABLE: !Sub outageshield-deployments-${Environment}
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          import uuid

          bedrock_agent = boto3.client('bedrock-agent-runtime')
          dynamodb = boto3.resource('dynamodb')

          AGENT_ID = os.environ.get('AGENT_ID', '')
          AGENT_ALIAS_ID = os.environ.get('AGENT_ALIAS_ID', 'TSTALIASID')
          INCIDENTS_TABLE = os.environ.get('INCIDENTS_TABLE', 'outageshield-incidents-dev')

          def lambda_handler(event, context):
              """
              Invoke Bedrock Agent to call 6 tools, but ONLY use the raw tool results.
              We ignore the agent's text response entirely to prevent hallucination.
              """
              signal = event.get('signal', {})
              incident_id = signal.get('signal_id', '')
              service = signal.get('service', 'unknown')
              alarm_name = signal.get('alarm_name', '')

              step3 = event.get('step3', {})
              root_causes = step3.get('root_causes', [])
              root_cause = root_causes[0].get('description', 'Unknown') if root_causes else 'Unknown'

              # Extract alarm type for runbook lookup
              alarm_type = alarm_name.split('-')[0] if '-' in alarm_name else alarm_name
              if alarm_type.startswith('Outage signal'):
                  if 'latency' in root_cause.lower():
                      alarm_type = 'HighLatency'
                  elif '5xx' in root_cause.lower() or 'error' in root_cause.lower():
                      alarm_type = 'High5xxRate'
                  elif 'memory' in root_cause.lower():
                      alarm_type = 'MemoryPressure'
                  elif 'cpu' in root_cause.lower():
                      alarm_type = 'HighCPU'
                  else:
                      alarm_type = 'HighLatency'

              prompt = f"""Execute ALL 6 tools in order for service '{service}':
          1. searchIncidentHistory(service="{service}")
          2. searchLogs(service="{service}", time_range="6h")
          3. getRunbook(service="{service}", alarm_type="{alarm_type}")
          4. checkDeployments(service="{service}")
          5. searchTraces(service="{service}", time_range="1h")
          6. checkConfigDrift(service="{service}")

          Context: Alarm={alarm_name}, Root cause={root_cause}

          IMPORTANT: Call all 6 tools. Do not skip any."""

              print(f"Invoking Bedrock Agent for {incident_id}: service={service}, alarm_type={alarm_type}")

              tool_results = {
                  'incident_history': None,
                  'logs': None,
                  'runbook': None,
                  'deployments': None,
                  'xray': None,
                  'config': None
              }

              try:
                  response = bedrock_agent.invoke_agent(
                      agentId=AGENT_ID,
                      agentAliasId=AGENT_ALIAS_ID,
                      sessionId=str(uuid.uuid4()),
                      inputText=prompt,
                      enableTrace=True
                  )

                  # Process the event stream and extract ONLY tool results
                  for event_stream in response.get('completion', []):
                      if 'trace' in event_stream:
                          trace = event_stream['trace'].get('trace', {})
                          orchestration = trace.get('orchestrationTrace', {})
                          
                          if 'observation' in orchestration:
                              obs = orchestration['observation']
                              if 'actionGroupInvocationOutput' in obs:
                                  output = obs['actionGroupInvocationOutput']
                                  text = output.get('text', '')
                                  
                                  try:
                                      result = json.loads(text) if text.startswith('{') else {'raw': text}
                                  except:
                                      result = {'raw': text}
                                  
                                  result_str = str(result).lower()
                                  if 'total_past_incidents' in result_str or ('incidents' in result and 'total_past' in result_str):
                                      tool_results['incident_history'] = result
                                  elif 'error_traces' in result_str or 'slow_traces' in result_str or 'service_stats' in result_str:
                                      tool_results['xray'] = result
                                  elif 'non_compliant' in result_str or 'config_enabled' in result_str or 'compliance' in result_str:
                                      tool_results['config'] = result
                                  elif 'patterns' in result or 'data_source' in result:
                                      tool_results['logs'] = result
                                  elif 'runbook' in result or 'steps' in result_str:
                                      tool_results['runbook'] = result
                                  elif 'deployments' in result or 'config_changes' in result:
                                      tool_results['deployments'] = result

                  investigation = format_tool_results(tool_results)
                  print(f"Investigation formatted for {incident_id}: {len(investigation)} chars")

                  table = dynamodb.Table(INCIDENTS_TABLE)
                  table.update_item(
                      Key={'incident_id': incident_id},
                      UpdateExpression='SET agent_investigation = :ai',
                      ExpressionAttributeValues={':ai': investigation[:4000]}
                  )

                  return {
                      'statusCode': 200,
                      'incident_id': incident_id,
                      'investigation': investigation[:4000],
                      'status': 'completed',
                      'tools_called': sum(1 for v in tool_results.values() if v is not None)
                  }

              except Exception as e:
                  print(f"Agent invocation failed: {e}")
                  return {
                      'statusCode': 200,
                      'incident_id': incident_id,
                      'investigation': f'Agent investigation failed: {str(e)[:100]}',
                      'status': 'failed'
                  }


          def format_tool_results(tool_results):
              """Format investigation from RAW tool results ONLY - no LLM interpretation."""
              sections = []

              sections.append("[Source: Incident History DB]")
              ih = tool_results.get('incident_history')
              if ih:
                  incidents = ih.get('incidents', [])
                  if incidents:
                      for inc in incidents[:5]:
                          inc_id = inc.get('incident_id', 'Unknown')
                          title = inc.get('title', 'No title')
                          rc = inc.get('root_cause', 'Unknown')
                          status = inc.get('status', 'Unknown')
                          sections.append(f"- {inc_id}: {title} (Root cause: {rc}, Status: {status})")
                  else:
                      sections.append("No past incidents found for this service.")
              else:
                  sections.append("Tool not called or no data returned.")

              sections.append("\n[Source: OpenSearch Logs]")
              logs = tool_results.get('logs')
              if logs:
                  patterns = logs.get('patterns', [])
                  if patterns:
                      for log in patterns[:5]:
                          alarm = log.get('alarm_name', 'Unknown')
                          msg = log.get('message', '')[:100]
                          ts = log.get('timestamp', '')
                          sections.append(f"- {alarm}: {msg} ({ts})")
                  else:
                      data_source = logs.get('data_source', 'Unknown')
                      sections.append(f"No log entries found. Data source: {data_source}")
              else:
                  sections.append("Tool not called or no data returned.")

              sections.append("\n[Source: Runbook DB]")
              rb_result = tool_results.get('runbook')
              if rb_result:
                  if rb_result.get('found') and rb_result.get('runbook'):
                      rb = rb_result['runbook']
                      sections.append(f"Runbook: {rb.get('title', 'Unknown')}")
                      sections.append(f"Category: {rb.get('category', 'Unknown')}, Estimated TTR: {rb.get('estimated_ttr', 'Unknown')}")
                      steps = rb.get('steps', [])
                      if steps:
                          sections.append("Steps:")
                          for i, step in enumerate(steps[:5], 1):
                              sections.append(f"  {i}. {step}")
                  else:
                      alarm_type = rb_result.get('alarm_type', 'Unknown')
                      sections.append(f"No runbook found for alarm type: {alarm_type}")
              else:
                  sections.append("Tool not called or no data returned.")

              sections.append("\n[Source: Deployment History]")
              deps = tool_results.get('deployments')
              if deps:
                  deployments = deps.get('deployments', [])
                  config_changes = deps.get('config_changes', [])
                  if deployments or config_changes:
                      for dep in deployments[:3]:
                          dep_id = dep.get('deployment_id', 'Unknown')
                          version = dep.get('version', 'Unknown')
                          status = dep.get('status', 'Unknown')
                          changes = dep.get('changes', '')[:50]
                          sections.append(f"- Deploy {dep_id}: v{version} ({status}) - {changes}")
                      for cfg in config_changes[:3]:
                          param = cfg.get('parameter', 'Unknown')
                          old_val = cfg.get('old_value', '')
                          new_val = cfg.get('new_value', '')
                          sections.append(f"- Config: {param} changed from {old_val} to {new_val}")
                  else:
                      sections.append("No recent deployments or config changes found.")
              else:
                  sections.append("Tool not called or no data returned.")

              sections.append("\n[Source: X-Ray Traces]")
              xray = tool_results.get('xray')
              if xray:
                  error_traces = xray.get('error_traces', [])
                  slow_traces = xray.get('slow_traces', [])
                  service_stats = xray.get('service_stats', {})
                  insights = xray.get('insights', [])
                  
                  if service_stats:
                      sections.append(f"Service: {service_stats.get('name', 'Unknown')}, Type: {service_stats.get('type', 'Unknown')}")
                      sections.append(f"Requests: {service_stats.get('total_requests', 0)}, Errors: {service_stats.get('error_count', 0)}, Faults: {service_stats.get('fault_count', 0)}")
                      sections.append(f"Avg Response Time: {service_stats.get('avg_response_time_ms', 0)}ms")
                  
                  if error_traces:
                      sections.append("Error Traces:")
                      for t in error_traces[:3]:
                          sections.append(f"  - {t.get('trace_id', '')[:20]}: {t.get('duration_ms', 0)}ms, HTTP {t.get('http_status', 0)}")
                  
                  if slow_traces:
                      sections.append("Slow Traces (>1s):")
                      for t in slow_traces[:3]:
                          sections.append(f"  - {t.get('trace_id', '')[:20]}: {t.get('response_time_ms', 0)}ms")
                  
                  if insights:
                      sections.append("X-Ray Insights:")
                      for i in insights[:2]:
                          sections.append(f"  - {i.get('category', 'Unknown')}: {i.get('summary', '')[:80]}")
                  
                  if not error_traces and not slow_traces and not service_stats:
                      sections.append("No X-Ray trace data found for this service.")
              else:
                  sections.append("Tool not called or no data returned.")

              sections.append("\n[Source: AWS Config]")
              config = tool_results.get('config')
              if config:
                  summary = config.get('summary', {})
                  non_compliant = config.get('non_compliant_resources', [])
                  recent_changes = config.get('recent_changes', [])
                  
                  if summary.get('config_enabled'):
                      sections.append(f"Config enabled: Yes, Non-compliant resources: {summary.get('total_non_compliant', 0)}, Recent changes: {summary.get('total_changes', 0)}")
                  else:
                      sections.append("AWS Config is not enabled in this region.")
                  
                  if non_compliant:
                      sections.append("Non-compliant Resources:")
                      for r in non_compliant[:3]:
                          sections.append(f"  - {r.get('resource_type', '')}: {r.get('resource_id', '')}")
                          for v in r.get('violations', [])[:2]:
                              sections.append(f"    Rule: {v.get('rule_name', '')}")
                  
                  if recent_changes:
                      sections.append("Recent Config Changes:")
                      for c in recent_changes[:3]:
                          sections.append(f"  - {c.get('resource_type', '')}: {c.get('resource_id', '')} ({c.get('status', '')})")
                  
                  if not non_compliant and not recent_changes and summary.get('config_enabled'):
                      sections.append("No compliance issues or recent changes found.")
              else:
                  sections.append("Tool not called or no data returned.")

              return "\n".join(sections)

  AgentInvokerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/outageshield-agent-invoker-${Environment}
      RetentionInDays: !Ref RetentionDays

Outputs:
  AgentId:
    Description: Bedrock Agent ID
    Value: !GetAtt IncidentInvestigatorAgent.AgentId
    Export:
      Name: !Sub outageshield-bedrock-agent-${Environment}-AgentId

  AgentArn:
    Description: Bedrock Agent ARN
    Value: !GetAtt IncidentInvestigatorAgent.AgentArn
    Export:
      Name: !Sub outageshield-bedrock-agent-${Environment}-AgentArn

  AgentInvokerLambdaArn:
    Description: Agent Invoker Lambda ARN (called by Step Functions)
    Value: !GetAtt AgentInvokerLambda.Arn
    Export:
      Name: !Sub outageshield-bedrock-agent-${Environment}-InvokerLambdaArn

  AgentActionLambdaArn:
    Description: Agent Action Lambda ARN (6 investigation tools)
    Value: !GetAtt AgentActionLambda.Arn
    Export:
      Name: !Sub outageshield-bedrock-agent-${Environment}-ActionLambdaArn
