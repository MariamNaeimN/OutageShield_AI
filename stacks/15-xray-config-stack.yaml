AWSTemplateFormatVersion: '2010-09-09'
Description: >
  OutageShield AI - X-Ray & AWS Config Integration Stack
  Adds application tracing and configuration drift detection capabilities.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  RetentionDays:
    Type: Number
    Default: 14

Resources:

  # ─────────────────────────────────────────────────────────────────────────────
  # X-Ray Trace Analyzer Lambda
  # Queries X-Ray for traces related to a service during incident timeframe
  # ─────────────────────────────────────────────────────────────────────────────
  XRayAnalyzerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub outageshield-xray-analyzer-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayReadOnlyAccess
      Policies:
        - PolicyName: XRayAnalyzerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - xray:GetTraceSummaries
                  - xray:BatchGetTraces
                  - xray:GetServiceGraph
                  - xray:GetTraceGraph
                  - xray:GetInsightSummaries
                  - xray:GetInsight
                Resource: '*'

  XRayAnalyzerLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub outageshield-xray-analyzer-${Environment}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt XRayAnalyzerRole.Arn
      Timeout: 60
      MemorySize: 256
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from datetime import datetime, timedelta, timezone

          xray = boto3.client('xray')

          def lambda_handler(event, context):
              """
              Analyze X-Ray traces for a service to find latency issues,
              errors, and dependency problems.
              """
              service = event.get('service', '')
              time_range = event.get('time_range', '1h')
              
              # Parse time range
              hours = int(time_range.replace('h', '')) if 'h' in time_range else 1
              end_time = datetime.now(timezone.utc)
              start_time = end_time - timedelta(hours=hours)
              
              results = {
                  'service': service,
                  'time_range': time_range,
                  'traces': [],
                  'error_traces': [],
                  'slow_traces': [],
                  'service_graph': {},
                  'insights': []
              }
              
              try:
                  # Get trace summaries with errors or high latency
                  filter_expr = f'service(id(name: "{service}"))'
                  
                  # Get error traces
                  error_response = xray.get_trace_summaries(
                      StartTime=start_time,
                      EndTime=end_time,
                      FilterExpression=f'{filter_expr} AND error',
                      Sampling=True
                  )
                  
                  error_traces = error_response.get('TraceSummaries', [])
                  results['error_traces'] = [
                      {
                          'trace_id': t.get('Id', ''),
                          'duration': t.get('Duration', 0),
                          'response_time': t.get('ResponseTime', 0),
                          'has_error': t.get('HasError', False),
                          'has_fault': t.get('HasFault', False),
                          'http_status': t.get('Http', {}).get('HttpStatus', 0),
                          'http_url': t.get('Http', {}).get('HttpURL', ''),
                          'timestamp': str(t.get('ResponseTime', ''))
                      }
                      for t in error_traces[:10]
                  ]
                  
                  # Get slow traces (>1s response time)
                  slow_response = xray.get_trace_summaries(
                      StartTime=start_time,
                      EndTime=end_time,
                      FilterExpression=f'{filter_expr} AND responsetime > 1',
                      Sampling=True
                  )
                  
                  slow_traces = slow_response.get('TraceSummaries', [])
                  results['slow_traces'] = [
                      {
                          'trace_id': t.get('Id', ''),
                          'duration': t.get('Duration', 0),
                          'response_time': t.get('ResponseTime', 0),
                          'http_url': t.get('Http', {}).get('HttpURL', ''),
                          'annotations': t.get('Annotations', {})
                      }
                      for t in slow_traces[:10]
                  ]
                  
                  # Get service graph to understand dependencies
                  graph_response = xray.get_service_graph(
                      StartTime=start_time,
                      EndTime=end_time
                  )
                  
                  services = graph_response.get('Services', [])
                  service_info = None
                  for svc in services:
                      if service.lower() in svc.get('Name', '').lower():
                          service_info = svc
                          break
                  
                  if service_info:
                      summary = service_info.get('SummaryStatistics', {})
                      results['service_graph'] = {
                          'name': service_info.get('Name', ''),
                          'type': service_info.get('Type', ''),
                          'total_requests': summary.get('TotalCount', 0),
                          'ok_count': summary.get('OkCount', 0),
                          'error_count': summary.get('ErrorStatistics', {}).get('TotalCount', 0),
                          'fault_count': summary.get('FaultStatistics', {}).get('TotalCount', 0),
                          'avg_response_time': summary.get('TotalResponseTime', 0) / max(summary.get('TotalCount', 1), 1),
                          'edges': [
                              {
                                  'destination': e.get('ReferenceId', ''),
                                  'summary': e.get('SummaryStatistics', {})
                              }
                              for e in service_info.get('Edges', [])
                          ]
                      }
                  
                  # Get X-Ray Insights if available
                  try:
                      insights_response = xray.get_insight_summaries(
                          StartTime=start_time,
                          EndTime=end_time,
                          States=['ACTIVE']
                      )
                      
                      results['insights'] = [
                          {
                              'insight_id': i.get('InsightId', ''),
                              'category': i.get('Categories', ['Unknown'])[0] if i.get('Categories') else 'Unknown',
                              'state': i.get('State', ''),
                              'summary': i.get('Summary', ''),
                              'root_cause_service': i.get('RootCauseServiceId', {}).get('Name', ''),
                              'top_anomalous_services': [
                                  s.get('ServiceId', {}).get('Name', '')
                                  for s in i.get('TopAnomalousServices', [])[:3]
                              ]
                          }
                          for i in insights_response.get('InsightSummaries', [])[:5]
                      ]
                  except Exception as e:
                      print(f"Insights not available: {e}")
                  
                  # Summary
                  results['summary'] = {
                      'total_error_traces': len(results['error_traces']),
                      'total_slow_traces': len(results['slow_traces']),
                      'total_insights': len(results['insights']),
                      'service_found': bool(service_info),
                      'data_source': 'AWS X-Ray'
                  }
                  
              except Exception as e:
                  print(f"X-Ray analysis failed: {e}")
                  results['error'] = str(e)
                  results['summary'] = {
                      'total_error_traces': 0,
                      'total_slow_traces': 0,
                      'total_insights': 0,
                      'service_found': False,
                      'data_source': 'AWS X-Ray (error)'
                  }
              
              return results

  XRayAnalyzerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/outageshield-xray-analyzer-${Environment}
      RetentionInDays: !Ref RetentionDays

  # ─────────────────────────────────────────────────────────────────────────────
  # AWS Config Drift Detector Lambda
  # Checks for configuration compliance and drift
  # ─────────────────────────────────────────────────────────────────────────────
  ConfigDriftRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub outageshield-config-drift-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ConfigDriftPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - config:GetComplianceDetailsByResource
                  - config:GetComplianceSummaryByResourceType
                  - config:DescribeComplianceByResource
                  - config:DescribeConfigRules
                  - config:GetResourceConfigHistory
                  - config:ListDiscoveredResources
                  - config:SelectResourceConfig
                  - config:DescribeConfigurationRecorderStatus
                Resource: '*'

  ConfigDriftLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub outageshield-config-drift-${Environment}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt ConfigDriftRole.Arn
      Timeout: 60
      MemorySize: 256
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from datetime import datetime, timedelta, timezone

          config_client = boto3.client('config')

          def lambda_handler(event, context):
              """
              Check AWS Config for compliance issues and configuration drift
              related to a service or resource.
              """
              service = event.get('service', '')
              resource_type = event.get('resource_type', '')
              
              results = {
                  'service': service,
                  'non_compliant_resources': [],
                  'config_changes': [],
                  'compliance_summary': {},
                  'rules_evaluated': []
              }
              
              try:
                  # Check if Config is enabled
                  recorder_status = config_client.describe_configuration_recorder_status()
                  recorders = recorder_status.get('ConfigurationRecordersStatus', [])
                  config_enabled = any(r.get('recording', False) for r in recorders)
                  
                  if not config_enabled:
                      results['error'] = 'AWS Config is not enabled in this region'
                      results['summary'] = {
                          'config_enabled': False,
                          'total_non_compliant': 0,
                          'total_config_changes': 0,
                          'data_source': 'AWS Config (disabled)'
                      }
                      return results
                  
                  # Get non-compliant resources
                  compliance_response = config_client.describe_compliance_by_resource(
                      ComplianceTypes=['NON_COMPLIANT'],
                      Limit=50
                  )
                  
                  non_compliant = compliance_response.get('ComplianceByResources', [])
                  
                  # Filter by service name if provided
                  for resource in non_compliant:
                      resource_id = resource.get('ResourceId', '')
                      resource_type = resource.get('ResourceType', '')
                      
                      # Check if resource is related to the service
                      if service.lower() in resource_id.lower() or not service:
                          results['non_compliant_resources'].append({
                              'resource_id': resource_id,
                              'resource_type': resource_type,
                              'compliance_status': resource.get('Compliance', {}).get('ComplianceType', 'UNKNOWN')
                          })
                  
                  # Get compliance details for non-compliant resources
                  for resource in results['non_compliant_resources'][:5]:
                      try:
                          details = config_client.get_compliance_details_by_resource(
                              ResourceType=resource['resource_type'],
                              ResourceId=resource['resource_id'],
                              ComplianceTypes=['NON_COMPLIANT']
                          )
                          
                          eval_results = details.get('EvaluationResults', [])
                          resource['violations'] = [
                              {
                                  'rule_name': e.get('EvaluationResultIdentifier', {}).get('EvaluationResultQualifier', {}).get('ConfigRuleName', ''),
                                  'annotation': e.get('Annotation', ''),
                                  'result_recorded_time': str(e.get('ResultRecordedTime', ''))
                              }
                              for e in eval_results[:3]
                          ]
                      except Exception as e:
                          print(f"Failed to get details for {resource['resource_id']}: {e}")
                  
                  # Get recent configuration changes using SQL query
                  try:
                      # Query for recent changes related to the service
                      query = f"""
                      SELECT
                          resourceId,
                          resourceType,
                          configurationItemCaptureTime,
                          configurationItemStatus
                      WHERE
                          resourceType LIKE '%'
                          AND configurationItemCaptureTime > '{(datetime.now(timezone.utc) - timedelta(hours=24)).isoformat()}'
                      LIMIT 20
                      """
                      
                      if service:
                          query = f"""
                          SELECT
                              resourceId,
                              resourceType,
                              configurationItemCaptureTime,
                              configurationItemStatus
                          WHERE
                              resourceId LIKE '%{service}%'
                              AND configurationItemCaptureTime > '{(datetime.now(timezone.utc) - timedelta(hours=24)).isoformat()}'
                          LIMIT 20
                          """
                      
                      query_response = config_client.select_resource_config(
                          Expression=query
                      )
                      
                      for result in query_response.get('Results', []):
                          item = json.loads(result)
                          results['config_changes'].append({
                              'resource_id': item.get('resourceId', ''),
                              'resource_type': item.get('resourceType', ''),
                              'capture_time': item.get('configurationItemCaptureTime', ''),
                              'status': item.get('configurationItemStatus', '')
                          })
                  except Exception as e:
                      print(f"Config query failed: {e}")
                  
                  # Get compliance summary
                  try:
                      summary_response = config_client.get_compliance_summary_by_resource_type()
                      
                      results['compliance_summary'] = {
                          'by_resource_type': [
                              {
                                  'resource_type': s.get('ResourceType', ''),
                                  'compliant': s.get('ComplianceSummary', {}).get('CompliantResourceCount', {}).get('CappedCount', 0),
                                  'non_compliant': s.get('ComplianceSummary', {}).get('NonCompliantResourceCount', {}).get('CappedCount', 0)
                              }
                              for s in summary_response.get('ComplianceSummariesByResourceType', [])[:10]
                          ]
                      }
                  except Exception as e:
                      print(f"Compliance summary failed: {e}")
                  
                  # Get active Config rules
                  try:
                      rules_response = config_client.describe_config_rules(Limit=25)
                      
                      results['rules_evaluated'] = [
                          {
                              'rule_name': r.get('ConfigRuleName', ''),
                              'description': r.get('Description', '')[:100] if r.get('Description') else '',
                              'source': r.get('Source', {}).get('Owner', ''),
                              'state': r.get('ConfigRuleState', '')
                          }
                          for r in rules_response.get('ConfigRules', [])
                          if r.get('ConfigRuleState') == 'ACTIVE'
                      ]
                  except Exception as e:
                      print(f"Rules query failed: {e}")
                  
                  # Summary
                  results['summary'] = {
                      'config_enabled': True,
                      'total_non_compliant': len(results['non_compliant_resources']),
                      'total_config_changes': len(results['config_changes']),
                      'total_rules': len(results['rules_evaluated']),
                      'data_source': 'AWS Config'
                  }
                  
              except Exception as e:
                  print(f"Config drift check failed: {e}")
                  results['error'] = str(e)
                  results['summary'] = {
                      'config_enabled': False,
                      'total_non_compliant': 0,
                      'total_config_changes': 0,
                      'data_source': 'AWS Config (error)'
                  }
              
              return results

  ConfigDriftLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/outageshield-config-drift-${Environment}
      RetentionInDays: !Ref RetentionDays

  # ─────────────────────────────────────────────────────────────────────────────
  # EventBridge Rule for Config Compliance Changes
  # Triggers when resources become non-compliant
  # ─────────────────────────────────────────────────────────────────────────────
  ConfigComplianceRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub outageshield-config-compliance-${Environment}
      Description: Trigger on AWS Config compliance changes
      EventPattern:
        source:
          - aws.config
        detail-type:
          - Config Rules Compliance Change
        detail:
          newEvaluationResult:
            complianceType:
              - NON_COMPLIANT
      State: ENABLED
      Targets:
        - Id: ConfigComplianceTarget
          Arn: !GetAtt ConfigDriftLambda.Arn

  ConfigComplianceLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ConfigDriftLambda.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ConfigComplianceRule.Arn

Outputs:
  XRayAnalyzerLambdaArn:
    Description: X-Ray Analyzer Lambda ARN
    Value: !GetAtt XRayAnalyzerLambda.Arn
    Export:
      Name: !Sub outageshield-xray-config-${Environment}-XRayLambdaArn

  ConfigDriftLambdaArn:
    Description: Config Drift Detector Lambda ARN
    Value: !GetAtt ConfigDriftLambda.Arn
    Export:
      Name: !Sub outageshield-xray-config-${Environment}-ConfigLambdaArn
