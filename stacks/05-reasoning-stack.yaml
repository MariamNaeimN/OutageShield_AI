AWSTemplateFormatVersion: '2010-09-09'
Description: >
  OutageShield AI - Reasoning Stack
  Amazon Bedrock Agent for root-cause analysis, remediation recommendations,
  severity scoring, and postmortem generation.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Deployment environment

  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-haiku-20240307-v1:0
    Description: Bedrock foundation model ID

  RetentionDays:
    Type: Number
    Default: 14
    Description: CloudWatch log retention in days

Resources:

  # ─────────────────────────────────────────────────────────────────────────────
  # Bedrock Agent IAM Role
  # ─────────────────────────────────────────────────────────────────────────────
  BedrockAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub outageshield-bedrock-agent-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAgentPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelId}
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource:
                  - !ImportValue
                    Fn::Sub: outageshield-storage-${Environment}-IncidentsTableArn
                  - !Sub
                    - ${TableArn}/index/*
                    - TableArn: !ImportValue
                        Fn::Sub: outageshield-storage-${Environment}-IncidentsTableArn
                  - !ImportValue
                    Fn::Sub: outageshield-storage-${Environment}-RunbooksTableArn
              - Effect: Allow
                Action:
                  - aoss:APIAccessAll
                Resource:
                  - !ImportValue
                    Fn::Sub: outageshield-storage-${Environment}-OpenSearchArn

  # ─────────────────────────────────────────────────────────────────────────────
  # Root Cause Analysis Lambda
  # Code managed via: scripts/update-rca-lambda-v2.py
  # Features: bulletproof JSON parsing, clean text root_cause, stores root_causes_raw
  # ─────────────────────────────────────────────────────────────────────────────
  RootCauseLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub outageshield-rootcause-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: RootCausePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelId}
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: '*'

  RootCauseLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub outageshield-rootcause-${Environment}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt RootCauseLambdaRole.Arn
      Timeout: 90
      MemorySize: 1024
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          MODEL_ID: !Ref BedrockModelId
          INCIDENTS_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-IncidentsTableName
          RUNBOOKS_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-RunbooksTableName
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          bedrock = boto3.client('bedrock-runtime')
          dynamodb = boto3.resource('dynamodb')
          MODEL_ID = os.environ['MODEL_ID']

          def lambda_handler(event, context):
              incident_context = event.get('incident_context', event.get('signal', {}))
              incident_id = incident_context.get('signal_id', incident_context.get('signal', {}).get('signal_id', ''))
              prompt = build_rca_prompt(incident_context)
              response = invoke_bedrock(prompt)
              root_causes = parse_root_causes(response)

              if incident_id and root_causes:
                  store_root_cause(incident_id, root_causes)

              return {
                  'statusCode': 200,
                  'root_causes': root_causes,
                  'incident_context_id': incident_context.get('context_id', 'unknown')
              }

          def store_root_cause(incident_id, root_causes):
              table = dynamodb.Table(os.environ.get('INCIDENTS_TABLE', 'outageshield-incidents-dev'))
              top = root_causes[0] if root_causes else {}
              description = extract_clean_description(top)
              try:
                  table.update_item(
                      Key={'incident_id': incident_id},
                      UpdateExpression='SET root_cause = :rc, confidence = :c, root_causes_raw = :recs, workflow_step = :ws',
                      ExpressionAttributeValues={
                          ':rc': description,
                          ':c': int(top.get('confidence', 50)),
                          ':recs': json.dumps(root_causes, default=str),
                          ':ws': 'root_cause_analysis'
                      }
                  )
              except Exception as e:
                  print(f"Store RCA failed: {e}")

          def extract_clean_description(item):
              """Always return a clean plain-text description, never JSON."""
              desc = item.get('description', 'Unknown')
              if not isinstance(desc, str):
                  desc = str(desc)
              stripped = desc.strip()
              if stripped.startswith('[') or stripped.startswith('{'):
                  try:
                      parsed = json.loads(stripped)
                      if isinstance(parsed, list) and parsed:
                          if isinstance(parsed[0], dict):
                              return parsed[0].get('description', str(parsed[0])[:150])
                          return str(parsed[0])[:150]
                      if isinstance(parsed, dict):
                          return parsed.get('description', str(parsed)[:150])
                  except:
                      pass
                  for char in ['.', ',', '\\n']:
                      if char in stripped[10:]:
                          idx = stripped.index(char, 10)
                          return stripped[:idx+1] if char == '.' else stripped[:idx]
                  return stripped[:150]
              return desc

          def build_rca_prompt(context):
              return f"""Analyze this incident and identify the top 3 probable root causes.

          IMPORTANT FORMAT RULES:
          - Return ONLY a valid JSON array
          - Each "description" MUST be a single plain-text sentence (e.g., "Database connection pool exhaustion due to increased load")
          - Do NOT put JSON inside the description field
          - Keep descriptions under 100 characters

          Return format:
          [
            {{"description": "short plain text sentence", "confidence": 80, "evidence": "what data supports this"}},
            {{"description": "another plain text sentence", "confidence": 60, "evidence": "supporting data"}}
          ]

          Incident context: {json.dumps(context, default=str)[:2000]}

          Return the JSON array only, no other text."""

          def invoke_bedrock(prompt):
              response = bedrock.invoke_model(
                  modelId=MODEL_ID,
                  body=json.dumps({
                      'anthropic_version': 'bedrock-2023-05-31',
                      'max_tokens': 2048,
                      'messages': [{'role': 'user', 'content': prompt}]
                  })
              )
              body = json.loads(response['body'].read())
              return body['content'][0]['text']

          def parse_root_causes(response_text):
              try:
                  text = response_text.strip()
                  if '```json' in text:
                      text = text.split('```json')[1].split('```')[0].strip()
                  elif '```' in text:
                      text = text.split('```')[1].split('```')[0].strip()
                  
                  if text.startswith('['):
                      causes = json.loads(text)
                  else:
                      start = text.find('[')
                      end = text.rfind(']') + 1
                      if start >= 0 and end > start:
                          causes = json.loads(text[start:end])
                      else:
                          return [{'description': text[:100], 'confidence': 50, 'evidence': 'Could not parse structured response'}]
                  
                  cleaned = []
                  for cause in causes[:3]:
                      if isinstance(cause, dict):
                          desc = cause.get('description', '')
                          if isinstance(desc, str) and desc.strip().startswith('['):
                              try:
                                  inner = json.loads(desc.strip())
                                  if isinstance(inner, list) and inner and isinstance(inner[0], dict):
                                      for inner_cause in inner[:3]:
                                          inner_desc = inner_cause.get('description', '')
                                          if isinstance(inner_desc, str) and not inner_desc.strip().startswith('['):
                                              cleaned.append({
                                                  'description': inner_desc,
                                                  'confidence': inner_cause.get('confidence', 50),
                                                  'evidence': inner_cause.get('evidence', '')
                                              })
                                      break
                              except:
                                  pass
                              continue
                          if isinstance(desc, str) and not desc.strip().startswith('{') and 'Parse error' not in desc:
                              cleaned.append(cause)
                          else:
                              plain = extract_clean_description(cause)
                              if plain and 'Parse error' not in plain:
                                  cleaned.append({
                                      'description': plain,
                                      'confidence': cause.get('confidence', 50),
                                      'evidence': cause.get('evidence', '')
                                  })
                  return cleaned if cleaned else [{'description': response_text[:100], 'confidence': 50, 'evidence': 'Parse fallback'}]
              except Exception as e:
                  print(f"Parse error: {e}")
                  text = response_text.strip()[:200]
                  if '.' in text[10:]:
                      text = text[:text.index('.', 10)+1]
                  return [{'description': text[:100], 'confidence': 50, 'evidence': f'Parse error: {str(e)[:50]}'}]

  # ─────────────────────────────────────────────────────────────────────────────
  # Remediation Recommendation Lambda
  # Code managed via: scripts/lambdas/update-remediation-lambda2.py
  # Features: PURE RULE-BASED logic (no AI), 6 sources, anti-hallucination design
  # Sources: deployment_correlation, log_patterns, runbook, past_incidents, xray_traces, config_drift
  # ─────────────────────────────────────────────────────────────────────────────
  RemediationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub outageshield-remediation-rec-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RemediationRecPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/${BedrockModelId}
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                Resource: '*'

  RemediationRecommendLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub outageshield-remediation-recommend-${Environment}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt RemediationLambdaRole.Arn
      Timeout: 60
      MemorySize: 512
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          MODEL_ID: !Ref BedrockModelId
          INCIDENTS_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-IncidentsTableName
      Code:
        ZipFile: |
          # Remediation Lambda - PURE RULE-BASED (No AI, No Hallucination)
          # See scripts/lambdas/update-remediation-lambda2.py for full implementation
          # Generates 6 recommendations from 6 sources:
          # 1. AGENT:deployment_correlation
          # 2. AGENT:log_patterns
          # 3. AGENT:runbook
          # 4. AGENT:past_incidents
          # 5. AGENT:xray_traces
          # 6. AGENT:config_drift
          import json
          import boto3
          import os

          dynamodb = boto3.resource('dynamodb')
          INCIDENTS_TABLE = os.environ.get('INCIDENTS_TABLE', 'outageshield-incidents-dev')

          def lambda_handler(event, context):
              # This is a placeholder - deploy full code via the script
              return {
                  'statusCode': 200,
                  'recommendations': [
                      {'category': 'manual_intervention', 'description': 'Deploy full code via scripts/lambdas/update-remediation-lambda2.py', 'source': 'AGENT:deployment_correlation', 'confidence': 50, 'risk': 'low', 'effectiveness': 1, 'estimated_ttr_minutes': 30}
                  ],
                  'summary': 'Placeholder - deploy full code'
              }

  # ─────────────────────────────────────────────────────────────────────────────
  # Severity & Impact Scoring Lambda
  # ─────────────────────────────────────────────────────────────────────────────
  ScoringLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub outageshield-scoring-${Environment}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt RootCauseLambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          MODEL_ID: !Ref BedrockModelId
          INCIDENTS_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-IncidentsTableName
      Code:
        ZipFile: |
          import json
          import boto3
          import os

          bedrock = boto3.client('bedrock-runtime')
          dynamodb = boto3.resource('dynamodb')
          MODEL_ID = os.environ['MODEL_ID']
          INCIDENTS_TABLE = os.environ['INCIDENTS_TABLE']

          def lambda_handler(event, context):
              incident_context = event.get('incident_context', event.get('signal', {}))
              incident_id = incident_context.get('signal_id', incident_context.get('signal', {}).get('signal_id', ''))
              service = incident_context.get('service', 'unknown')

              prompt = f"""You are a senior SRE at an e-commerce company doing $500M annual revenue ($57,000/hour average).
          Assess the business impact of this incident on service "{service}".

          THINK STEP BY STEP:
          1. What does this service do? (payment processing? internal logging? user-facing search?)
          2. How many users interact with it per hour? (payments = millions, internal tools = 0)
          3. What percentage of revenue flows through it? (payments = 60%, search = 5%, logging = 0%)
          4. What's the blast radius? (gateway down = everything down, logger down = no customer impact)

          EXAMPLES OF CORRECT SCORING:
          - payments-api with HighLatency: impact=9, users=1200000, revenue="$34,200/hour (60% of hourly revenue)", sla="Breached"
          - orders-service with High5xxRate: impact=8, users=800000, revenue="$22,800/hour (40% of orders affected)", sla="At Risk"
          - search-service with HighLatency: impact=6, users=200000, revenue="$2,850/hour (5% revenue from search)", sla="Warning"
          - notifications-svc with QueueDepth: impact=4, users=50000, revenue="$570/hour (delayed notifications)", sla="Warning"
          - audit-logger with DiskUsage: impact=2, users=0, revenue="$0 (internal only)", sla="OK"
          - cache-manager with HighCPU: impact=2, users=0, revenue="$0 (infrastructure)", sla="OK"
          - queue-processor with MemoryPressure: impact=1, users=0, revenue="$0 (background processing)", sla="OK"

          RULES:
          - revenue_at_risk MUST be a specific dollar amount with explanation (e.g., "$12,500/hour (based on 22% of transaction volume)")
          - affected_users MUST be 0 for internal/infrastructure services
          - sla_status: "Breached" only for impact 9-10, "At Risk" for 7-8, "Warning" for 4-6, "OK" for 1-3
          - DO NOT use generic values like "$X/hour" or "Significant" — always calculate a specific number

          Context: {json.dumps(incident_context, default=str)[:1200]}

          Return ONLY a JSON object:
          {{"severity_score": int, "business_impact_score": int, "affected_users": int, "revenue_at_risk": "string with dollar amount and explanation", "sla_status": "string", "service_risk_score": int, "reasoning": "string"}}"""

              try:
                  response = bedrock.invoke_model(
                      modelId=MODEL_ID,
                      body=json.dumps({
                          'anthropic_version': 'bedrock-2023-05-31',
                          'max_tokens': 512,
                          'messages': [{'role': 'user', 'content': prompt}]
                      })
                  )
                  body = json.loads(response['body'].read())
                  text = body['content'][0]['text']
                  start = text.find('{')
                  end = text.rfind('}') + 1
                  result = json.loads(text[start:end]) if start >= 0 else {}
                  scores = {
                      'severity_score': int(result.get('severity_score', 3)),
                      'business_impact_score': int(result.get('business_impact_score', 5)),
                      'affected_users': int(result.get('affected_users', 0)),
                      'revenue_at_risk': str(result.get('revenue_at_risk', 'Unknown')),
                      'sla_status': result.get('sla_status', 'Unknown'),
                      'service_risk_score': int(result.get('service_risk_score', 50)),
                      'scoring_reasoning': result.get('reasoning', '')
                  }
              except Exception as e:
                  print(f"Scoring error: {e}")
                  scores = {'severity_score': 3, 'business_impact_score': 5, 'affected_users': 0, 'revenue_at_risk': 'Unknown', 'sla_status': 'Unknown', 'service_risk_score': 50, 'scoring_reasoning': ''}

              if incident_id:
                  store_scores(incident_id, scores)

              return {'statusCode': 200, **scores, 'partial': False}

          def store_scores(incident_id, scores):
              table = dynamodb.Table(INCIDENTS_TABLE)
              try:
                  table.update_item(
                      Key={'incident_id': incident_id},
                      UpdateExpression='SET severity_score = :s, business_impact_score = :b, affected_users = :au, revenue_at_risk = :r, sla_status = :sla, service_risk_score = :srs, scoring_reasoning = :sr, workflow_step = :ws',
                      ExpressionAttributeValues={
                          ':s': scores['severity_score'],
                          ':b': scores['business_impact_score'],
                          ':au': scores['affected_users'],
                          ':r': scores['revenue_at_risk'],
                          ':sla': scores['sla_status'],
                          ':srs': scores['service_risk_score'],
                          ':sr': scores.get('scoring_reasoning', ''),
                          ':ws': 'scoring'
                      }
                  )
              except Exception as e:
                  print(f"Store scores failed: {e}")

  # ─────────────────────────────────────────────────────────────────────────────
  # Postmortem Generation Lambda
  # Code managed via: scripts/update-postmortem-lambda.py
  # Features: uses all previous steps (RCA, scoring, agent, recommendations) in prompt
  # Forces root_cause to match Step 3 output
  # ─────────────────────────────────────────────────────────────────────────────
  PostmortemLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub outageshield-postmortem-${Environment}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt RootCauseLambdaRole.Arn
      Timeout: 120
      MemorySize: 1024
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          MODEL_ID: !Ref BedrockModelId
          POSTMORTEMS_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-PostmortemsTableName
          INCIDENTS_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-IncidentsTableName
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          import uuid
          from datetime import datetime, timezone

          bedrock = boto3.client('bedrock-runtime')
          dynamodb = boto3.resource('dynamodb')
          MODEL_ID = os.environ['MODEL_ID']

          def lambda_handler(event, context):
              # Extract from Step Functions state — all previous steps are available
              signal = event.get('signal', {})
              incident_id = event.get('incident_id') or signal.get('signal_id', '')
              service = event.get('service') or signal.get('service', 'unknown')

              # Get root cause from Step 3
              step3 = event.get('step3', {})
              root_causes = step3.get('root_causes', [])
              root_cause = root_causes[0].get('description', '') if root_causes else ''
              confidence = root_causes[0].get('confidence', 0) if root_causes else 0

              # Get scoring from Step 2
              step2 = event.get('step2', {})
              severity = step2.get('severity_score', signal.get('severity_score', 3))
              affected_users = step2.get('affected_users', 0)
              revenue_at_risk = step2.get('revenue_at_risk', 'Unknown')
              scoring_reasoning = step2.get('scoring_reasoning', '')

              # Get agent investigation from Step 3b
              step3b = event.get('step3b', {})
              agent_investigation = step3b.get('investigation', '')

              # Get recommendations from Step 4
              step4 = event.get('step4', {})
              recommendations = step4.get('recommendations', [])

              # Build a rich prompt using ALL previous step data
              prompt = f"""Generate a structured incident postmortem for service "{service}".

          USE THE FOLLOWING FACTS FROM THE INVESTIGATION (do NOT invent different information):

          ROOT CAUSE (from AI analysis, confidence {confidence}%):
          {root_cause or 'Unknown - analysis pending'}

          SEVERITY: {severity}/5
          AFFECTED USERS: {affected_users}
          REVENUE AT RISK: {revenue_at_risk}

          SCORING REASONING:
          {scoring_reasoning or 'Not available'}

          AGENT INVESTIGATION FINDINGS:
          {agent_investigation[:1500] or 'Agent investigation not available'}

          REMEDIATION RECOMMENDATIONS:
          {json.dumps(recommendations[:3], default=str)[:1000] if recommendations else 'None available'}

          ALARM DETAILS:
          {signal.get('source_event_summary', json.dumps(signal, default=str)[:500])}

          RULES:
          - The "root_cause" field MUST match the root cause above — do NOT invent a different one.
          - The "summary" should describe what happened using the facts above.
          - The "prevention" steps should be specific to this root cause, not generic.
          - The "impact" should use the affected_users and revenue_at_risk numbers above.
          - The "duration" should be estimated based on severity.

          Return ONLY a JSON object with:
          1. "summary" - what happened (2-3 sentences using the facts above)
          2. "root_cause" - MUST be: "{root_cause or 'Under investigation'}"
          3. "duration" - estimated duration based on severity
          4. "prevention" - array of 3 specific prevention steps for THIS root cause
          5. "impact" - who was affected (use the numbers above)

          Return JSON only."""

              try:
                  text = invoke_bedrock(prompt)
                  start = text.find('{')
                  end = text.rfind('}') + 1
                  postmortem_data = json.loads(text[start:end]) if start >= 0 else {}
                  # Force root cause to match Step 3
                  if root_cause:
                      postmortem_data['root_cause'] = root_cause
              except Exception as e:
                  print(f"Postmortem generation failed: {e}")
                  postmortem_data = {
                      'summary': f'Incident on {service}: {root_cause or "Under investigation"}',
                      'root_cause': root_cause or 'Analysis pending',
                      'prevention': ['Review and address root cause', 'Add monitoring for early detection', 'Update runbooks'],
                      'duration': 'Under investigation',
                      'impact': f'{affected_users} users affected. Revenue at risk: {revenue_at_risk}'
                  }

              # Store in postmortems table
              store_postmortem(incident_id, service, postmortem_data, scoring_reasoning)

              return {'statusCode': 200, 'postmortem': postmortem_data}

          def store_postmortem(incident_id, service, data, scoring_reasoning=''):
              if not incident_id:
                  return
              table = dynamodb.Table(os.environ['POSTMORTEMS_TABLE'])
              try:
                  table.put_item(Item={
                      'postmortem_id': 'PM-' + str(uuid.uuid4())[:8],
                      'incident_id': incident_id,
                      'service': service,
                      'title': f"Postmortem: {service} incident",
                      'summary': data.get('summary', ''),
                      'root_cause': data.get('root_cause', ''),
                      'duration': data.get('duration', 'Unknown'),
                      'prevention': json.dumps(data.get('prevention', [])),
                      'impact_summary': data.get('impact', ''),
                      'scoring_reasoning': scoring_reasoning,
                      'created_at': datetime.now(timezone.utc).isoformat(),
                      'status': 'GENERATED'
                  })
                  print(f"Postmortem stored for {incident_id}")
              except Exception as e:
                  print(f"Store postmortem failed: {e}")
              # Also update incident status
              try:
                  inc_table = dynamodb.Table(os.environ['INCIDENTS_TABLE'])
                  inc_table.update_item(
                      Key={'incident_id': incident_id},
                      UpdateExpression='SET workflow_step = :ws, postmortem_generated = :pg',
                      ExpressionAttributeValues={':ws': 'postmortem', ':pg': True}
                  )
              except Exception:
                  pass

          def invoke_bedrock(prompt):
              response = bedrock.invoke_model(
                  modelId=MODEL_ID,
                  body=json.dumps({
                      'anthropic_version': 'bedrock-2023-05-31',
                      'max_tokens': 2048,
                      'messages': [{'role': 'user', 'content': prompt}]
                  })
              )
              body = json.loads(response['body'].read())
              return body['content'][0]['text']

  # ─────────────────────────────────────────────────────────────────────────────
  # Remediation Summary Lambda
  # Code managed via: scripts/lambdas/create-summary-lambda.py
  # Features: AI-powered summary, best recommendation selection, quick actions
  # ─────────────────────────────────────────────────────────────────────────────
  SummaryLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub outageshield-remediation-summary-${Environment}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt RemediationLambdaRole.Arn
      Timeout: 90
      MemorySize: 256
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          MODEL_ID: !Ref BedrockModelId
          INCIDENTS_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-IncidentsTableName
          AI_REASONING_TABLE: !Sub outageshield-ai-reasoning-${Environment}
      Code:
        ZipFile: |
          # Remediation Summary Lambda - AI-powered summary generation
          # See scripts/lambdas/create-summary-lambda.py for full implementation
          # This is a placeholder - deploy full code via the script
          import json
          import boto3
          import os
          from datetime import datetime

          bedrock = boto3.client('bedrock-runtime')
          dynamodb = boto3.resource('dynamodb')
          MODEL_ID = os.environ.get('MODEL_ID', 'anthropic.claude-3-haiku-20240307-v1:0')
          INCIDENTS_TABLE = os.environ.get('INCIDENTS_TABLE', 'outageshield-incidents-dev')

          def lambda_handler(event, context):
              signal = event.get('signal', {})
              incident_id = signal.get('signal_id', '')
              service = signal.get('service', 'unknown')
              step4 = event.get('step4', {})
              recommendations = step4.get('recommendations', [])
              
              # Find best recommendation
              best = recommendations[0] if recommendations else {'category': 'manual_intervention', 'description': 'Manual investigation required'}
              
              summary = {
                  'incident_id': incident_id,
                  'service': service,
                  'generated_at': datetime.utcnow().isoformat() + 'Z',
                  'total_recommendations': len(recommendations),
                  'recommended_action': {
                      'type': best.get('category', 'manual_intervention'),
                      'description': best.get('description', ''),
                      'confidence': best.get('confidence', 50),
                      'risk': best.get('risk', 'medium')
                  },
                  'ai_summary': f"Incident on {service} requires {best.get('category', 'investigation')}. {best.get('description', '')}"
              }
              
              # Store summary
              try:
                  table = dynamodb.Table(INCIDENTS_TABLE)
                  table.update_item(
                      Key={'incident_id': incident_id},
                      UpdateExpression='SET remediation_summary = :summary',
                      ExpressionAttributeValues={':summary': json.dumps(summary)}
                  )
              except Exception as e:
                  print(f'Store summary failed: {e}')
              
              return {'statusCode': 200, 'summary': summary}

  SummaryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/outageshield-remediation-summary-${Environment}
      RetentionInDays: !Ref RetentionDays

  # ─────────────────────────────────────────────────────────────────────────────
  # CloudWatch Log Groups
  # ─────────────────────────────────────────────────────────────────────────────
  RootCauseLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/outageshield-rootcause-${Environment}
      RetentionInDays: !Ref RetentionDays

  RemediationRecLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/outageshield-remediation-recommend-${Environment}
      RetentionInDays: !Ref RetentionDays

  ScoringLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/outageshield-scoring-${Environment}
      RetentionInDays: !Ref RetentionDays

  PostmortemLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/outageshield-postmortem-${Environment}
      RetentionInDays: !Ref RetentionDays

Outputs:
