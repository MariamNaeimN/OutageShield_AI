AWSTemplateFormatVersion: '2010-09-09'
Description: >
  OutageShield AI - Notifications & Ticketing Stack
  SNS notifications (with ticket link + details) + Jira AND PagerDuty ticket creation.
  Supports: Jira only, PagerDuty only, or both systems simultaneously.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  OpsEmailEndpoint:
    Type: String
    Default: ops-team@example.com
  RetentionDays:
    Type: Number
    Default: 14

Resources:

  # ─────────────────────────────────────────────────────────────────────────────
  # SNS Topics
  # ─────────────────────────────────────────────────────────────────────────────
  IncidentAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub outageshield-alerts-${Environment}

  EscalationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub outageshield-escalation-${Environment}

  ApprovalRequestTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub outageshield-approvals-${Environment}

  # ─────────────────────────────────────────────────────────────────────────────
  # Notification Lambda — SNS with ticket link + incident details
  # ─────────────────────────────────────────────────────────────────────────────
  NotificationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub outageshield-notification-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: NotificationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref IncidentAlertTopic
                  - !Ref EscalationTopic
                  - !Ref ApprovalRequestTopic
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                Resource: '*'

  NotificationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub outageshield-notification-${Environment}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt NotificationLambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          ALERT_TOPIC_ARN: !Ref IncidentAlertTopic
          ESCALATION_TOPIC_ARN: !Ref EscalationTopic
          INCIDENTS_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-IncidentsTableName
          WORKFLOW_STATE_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-WorkflowStateTableName
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from datetime import datetime, timezone

          sns = boto3.client('sns')
          dynamodb = boto3.resource('dynamodb')

          ALERT_TOPIC = os.environ.get('ALERT_TOPIC_ARN', '')
          ESCALATION_TOPIC = os.environ.get('ESCALATION_TOPIC_ARN', '')
          INCIDENTS_TABLE = os.environ.get('INCIDENTS_TABLE', 'outageshield-incidents-dev')

          def lambda_handler(event, context):
              signal = event.get('signal', {})
              incident_id = signal.get('signal_id', '')
              service = signal.get('service', 'unknown')

              # Get data from previous steps
              step2 = event.get('step2', {})
              step7 = event.get('step7', {})
              step3 = event.get('step3', {})

              severity = step2.get('severity_score', 4)
              revenue = step2.get('revenue_at_risk', 'Unknown')
              affected_users = step2.get('affected_users', 0)
              ticket_id = step7.get('ticket_id', 'N/A')
              ticket_url = step7.get('ticket_url', '')
              root_cause = step7.get('root_cause', '')

              if not root_cause:
                  root_causes = step3.get('root_causes', [])
                  root_cause = root_causes[0].get('description', 'Under investigation') if root_causes else 'Under investigation'

              alarm_name = signal.get('alarm_name', f'Incident on {service}')

              # Build detailed SNS message
              subject = f"[OutageShield] SEV-{severity} | {service} | {alarm_name}"

              message = f"""OutageShield AI - Incident Alert
              ==================================================

              Service:         {service}
              Severity:        SEV-{severity}
              Incident ID:     {incident_id}
              Alarm:           {alarm_name}
              Detected:        {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')}

              Root Cause:      {root_cause}
              Revenue at Risk: {revenue}
              Affected Users:  {affected_users}

              Jira Ticket:     {ticket_id}
              Ticket URL:      {ticket_url}

              Dashboard:       https://d2k1km1tzlio49.cloudfront.net/incidents/{incident_id}

              ==================================================
              Action Required: Review incident and approve remediation.
              """

              # Send SNS
              topic = ESCALATION_TOPIC if int(severity) >= 4 else ALERT_TOPIC
              notif_type = 'escalation' if int(severity) >= 4 else 'alert'

              try:
                  if topic:
                      sns.publish(TopicArn=topic, Subject=subject[:100], Message=message)
                      print(f"SNS sent to {notif_type} topic for {incident_id}")
              except Exception as e:
                  print(f"SNS publish failed: {e}")

              # Store notification record in DynamoDB
              notification = {
                  'type': notif_type,
                  'channel': 'SNS',
                  'status': 'sent',
                  'recipient': 'sre-team@shopsphere.com',
                  'subject': subject[:100],
                  'message': message,
                  'sent_at': datetime.now(timezone.utc).isoformat(),
                  'ticket_id': ticket_id,
                  'ticket_url': ticket_url
              }

              try:
                  table = dynamodb.Table(INCIDENTS_TABLE)
                  table.update_item(
                      Key={'incident_id': incident_id},
                      UpdateExpression='SET notifications = :n, workflow_step = :ws',
                      ExpressionAttributeValues={
                          ':n': json.dumps(notification),
                          ':ws': 'notified'
                      }
                  )
              except Exception as e:
                  print(f"DynamoDB notification store failed: {e}")

              return {'statusCode': 200, 'notification': notification}

  # ─────────────────────────────────────────────────────────────────────────────
  # Ticket Integrator Lambda — Jira + PagerDuty Integration
  # Code managed via: scripts/lambdas/add-pagerduty-integration.py
  # Features: Supports Jira, PagerDuty, or both systems
  # ─────────────────────────────────────────────────────────────────────────────
  TicketIntegratorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub outageshield-ticket-integrator-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: TicketPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                Resource: '*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:outageshield/*

  TicketIntegratorLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub outageshield-ticket-integrator-${Environment}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt TicketIntegratorRole.Arn
      Timeout: 60
      MemorySize: 256
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          INCIDENTS_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-IncidentsTableName
          WORKFLOW_STATE_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-WorkflowStateTableName
          JIRA_SECRET: outageshield/jira-credentials
          PAGERDUTY_SECRET: outageshield/pagerduty-credentials
          TICKET_SYSTEM: both  # Options: jira, pagerduty, both
          DASHBOARD_URL: https://d2k1km1tzlio49.cloudfront.net
      Code:
        ZipFile: |
          # Ticket Integrator Lambda - Jira + PagerDuty
          # See scripts/lambdas/add-pagerduty-integration.py for full implementation
          # This is a placeholder - deploy full code via the script
          import json
          import boto3
          import os
          import urllib.request
          import urllib.error
          import base64
          from datetime import datetime, timezone

          dynamodb = boto3.resource('dynamodb')
          sm = boto3.client('secretsmanager')

          INCIDENTS_TABLE = os.environ.get('INCIDENTS_TABLE', 'outageshield-incidents-dev')
          JIRA_SECRET = os.environ.get('JIRA_SECRET', 'outageshield/jira-credentials')
          PAGERDUTY_SECRET = os.environ.get('PAGERDUTY_SECRET', 'outageshield/pagerduty-credentials')
          TICKET_SYSTEM = os.environ.get('TICKET_SYSTEM', 'both')
          DASHBOARD_URL = os.environ.get('DASHBOARD_URL', 'https://d2k1km1tzlio49.cloudfront.net')

          def lambda_handler(event, context):
              signal = event.get('signal', {})
              incident_id = signal.get('signal_id', '')
              service = signal.get('service', 'unknown')
              step2 = event.get('step2', {})
              step3 = event.get('step3', {})
              severity = step2.get('severity_score', 4)
              root_causes = step3.get('root_causes', [])
              top_rc = root_causes[0].get('description', 'Under investigation') if root_causes else 'Under investigation'
              
              results = {'statusCode': 200, 'tickets': [], 'severity': severity, 'root_cause': top_rc}
              
              # Create tickets based on TICKET_SYSTEM setting
              if TICKET_SYSTEM in ['jira', 'both']:
                  jira_result = create_jira_ticket(incident_id, service, severity, top_rc)
                  results['tickets'].append(jira_result)
                  if jira_result.get('success'):
                      results['ticket_id'] = jira_result['ticket_id']
                      results['ticket_url'] = jira_result['ticket_url']
              
              if TICKET_SYSTEM in ['pagerduty', 'both']:
                  pd_result = create_pagerduty_incident(incident_id, service, severity, top_rc)
                  results['tickets'].append(pd_result)
                  if pd_result.get('success') and 'ticket_id' not in results:
                      results['ticket_id'] = pd_result['ticket_id']
                      results['ticket_url'] = pd_result['ticket_url']
              
              store_ticket_info(incident_id, results)
              return results

          def create_jira_ticket(incident_id, service, severity, root_cause):
              try:
                  secret = sm.get_secret_value(SecretId=JIRA_SECRET)
                  creds = json.loads(secret['SecretString'])
                  jira_url = creds['jira_url']
                  project_key = creds['project_key']
                  email = creds['email']
                  api_token = creds['api_token']
                  
                  summary = f"[OutageShield] SEV-{severity} | {service}"[:255]
                  priority_map = {5: 'Highest', 4: 'High', 3: 'Medium', 2: 'Low', 1: 'Lowest'}
                  
                  issue_data = {"fields": {"project": {"key": project_key}, "summary": summary, "issuetype": {"name": "Task"}, "priority": {"name": priority_map.get(severity, 'High')}}}
                  
                  url = f"{jira_url}/rest/api/3/issue"
                  data = json.dumps(issue_data).encode('utf-8')
                  auth_bytes = base64.b64encode(f"{email}:{api_token}".encode()).decode()
                  req = urllib.request.Request(url, data=data, method='POST')
                  req.add_header('Content-Type', 'application/json')
                  req.add_header('Authorization', f'Basic {auth_bytes}')
                  response = urllib.request.urlopen(req)
                  result = json.loads(response.read().decode())
                  ticket_id = result.get('key', 'UNKNOWN')
                  return {'system': 'Jira', 'success': True, 'ticket_id': ticket_id, 'ticket_url': f"{jira_url}/browse/{ticket_id}"}
              except Exception as e:
                  return {'system': 'Jira', 'success': False, 'error': str(e)[:100]}

          def create_pagerduty_incident(incident_id, service, severity, root_cause):
              try:
                  import time
                  secret = sm.get_secret_value(SecretId=PAGERDUTY_SECRET)
                  creds = json.loads(secret['SecretString'])
                  routing_key = creds['routing_key']
                  api_key = creds.get('api_key', '')
                  
                  severity_map = {5: 'critical', 4: 'critical', 3: 'error', 2: 'warning', 1: 'info'}
                  pd_severity = severity_map.get(severity, 'error')
                  dashboard_link = f"{DASHBOARD_URL}/incidents/{incident_id}"
                  alarm_name = f"Outage signal on {service}"
                  
                  # Use unique dedup_key with timestamp for each new incident
                  timestamp = datetime.now(timezone.utc).strftime('%Y%m%d%H%M%S')
                  dedup_key = f"{incident_id}-{timestamp}"
                  
                  event_payload = {
                      "routing_key": routing_key,
                      "event_action": "trigger",
                      "dedup_key": dedup_key,
                      "payload": {
                          "summary": f"[OutageShield] SEV-{severity} | {service} | {alarm_name}"[:255],
                          "source": "OutageShield AI",
                          "severity": pd_severity,
                          "timestamp": datetime.now(timezone.utc).isoformat(),
                          "component": service,
                          "custom_details": {"incident_id": incident_id, "service": service, "severity": severity, "root_cause": root_cause, "dashboard_url": dashboard_link}
                      },
                      "links": [{"href": dashboard_link, "text": "View in OutageShield Dashboard"}]
                  }
                  
                  url = "https://events.pagerduty.com/v2/enqueue"
                  data = json.dumps(event_payload).encode('utf-8')
                  req = urllib.request.Request(url, data=data, method='POST')
                  req.add_header('Content-Type', 'application/json')
                  response = urllib.request.urlopen(req)
                  result = json.loads(response.read().decode())
                  returned_dedup_key = result.get('dedup_key', dedup_key)
                  
                  # Fetch real PagerDuty URL using REST API
                  real_pd_id, real_pd_url = None, None
                  if api_key:
                      time.sleep(3)
                      try:
                          search_url = "https://api.pagerduty.com/incidents?limit=50&statuses[]=triggered&statuses[]=acknowledged&sort_by=created_at:desc"
                          req2 = urllib.request.Request(search_url)
                          req2.add_header('Authorization', f'Token token={api_key}')
                          req2.add_header('Content-Type', 'application/json')
                          resp2 = urllib.request.urlopen(req2)
                          pd_data = json.loads(resp2.read().decode())
                          for inc in pd_data.get('incidents', []):
                              title = inc.get('title', '')
                              if service in title and '[OutageShield]' in title:
                                  real_pd_id = inc.get('id', '')
                                  real_pd_url = inc.get('html_url', '')
                                  break
                      except Exception as e:
                          print(f"Failed to fetch real PagerDuty URL: {e}")
                  
                  ticket_id = real_pd_id if real_pd_id else f"PD-{returned_dedup_key[:8].upper()}"
                  ticket_url = real_pd_url if real_pd_url else f"https://app.pagerduty.com/incidents?search={returned_dedup_key}"
                  return {'system': 'PagerDuty', 'success': True, 'ticket_id': ticket_id, 'ticket_url': ticket_url, 'pagerduty_id': ticket_id, 'pagerduty_url': ticket_url}
              except Exception as e:
                  return {'system': 'PagerDuty', 'success': False, 'error': str(e)[:100]}

          def store_ticket_info(incident_id, results):
              try:
                  table = dynamodb.Table(INCIDENTS_TABLE)
                  tickets_json = json.dumps(results.get('tickets', []))
                  ticket_systems = [t['system'] for t in results.get('tickets', []) if t.get('success')]
                  
                  update_expr = 'SET ticket_id = :tid, ticket_system = :ts, ticket_status = :tst, ticket_url = :tu, tickets_all = :ta, workflow_step = :ws'
                  expr_values = {
                      ':tid': results.get('ticket_id', 'N/A'),
                      ':ts': ', '.join(ticket_systems) if ticket_systems else 'None',
                      ':tst': 'Open',
                      ':tu': results.get('ticket_url', ''),
                      ':ta': tickets_json,
                      ':ws': 'ticket_created'
                  }
                  
                  # Add PagerDuty fields if present
                  for t in results.get('tickets', []):
                      if t.get('system') == 'PagerDuty' and t.get('success'):
                          update_expr += ', pagerduty_id = :pdid, pagerduty_url = :pdurl'
                          expr_values[':pdid'] = t.get('pagerduty_id', t.get('ticket_id', ''))
                          expr_values[':pdurl'] = t.get('pagerduty_url', t.get('ticket_url', ''))
                          break
                  
                  table.update_item(Key={'incident_id': incident_id}, UpdateExpression=update_expr, ExpressionAttributeValues=expr_values)
              except Exception as e:
                  print(f"DynamoDB store failed: {e}")

  # ─────────────────────────────────────────────────────────────────────────────
  # Log Groups
  # ─────────────────────────────────────────────────────────────────────────────
  NotificationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/outageshield-notification-${Environment}
      RetentionInDays: !Ref RetentionDays

  TicketIntegratorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/outageshield-ticket-integrator-${Environment}
      RetentionInDays: !Ref RetentionDays

Outputs:
  IncidentAlertTopicArn:
    Value: !Ref IncidentAlertTopic
    Export:
      Name: !Sub outageshield-notifications-${Environment}-TopicArn

  EscalationTopicArn:
    Value: !Ref EscalationTopic
    Export:
      Name: !Sub outageshield-notifications-${Environment}-EscalationTopicArn

  NotificationLambdaArn:
    Value: !GetAtt NotificationLambda.Arn
    Export:
      Name: !Sub outageshield-notifications-${Environment}-LambdaArn

  TicketIntegratorLambdaArn:
    Value: !GetAtt TicketIntegratorLambda.Arn
    Export:
      Name: !Sub outageshield-notifications-${Environment}-TicketLambdaArn
