AWSTemplateFormatVersion: '2010-09-09'
Description: >
  OutageShield AI - Notifications & Ticketing Stack
  SNS notifications (with ticket link + details) + Jira ticket creation via REST API.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
  OpsEmailEndpoint:
    Type: String
    Default: ops-team@example.com
  RetentionDays:
    Type: Number
    Default: 14

Resources:

  # ─────────────────────────────────────────────────────────────────────────────
  # SNS Topics
  # ─────────────────────────────────────────────────────────────────────────────
  IncidentAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub outageshield-alerts-${Environment}

  EscalationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub outageshield-escalation-${Environment}

  ApprovalRequestTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub outageshield-approvals-${Environment}

  # ─────────────────────────────────────────────────────────────────────────────
  # Notification Lambda — SNS with ticket link + incident details
  # ─────────────────────────────────────────────────────────────────────────────
  NotificationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub outageshield-notification-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: NotificationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref IncidentAlertTopic
                  - !Ref EscalationTopic
                  - !Ref ApprovalRequestTopic
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                Resource: '*'

  NotificationLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub outageshield-notification-${Environment}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt NotificationLambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          ALERT_TOPIC_ARN: !Ref IncidentAlertTopic
          ESCALATION_TOPIC_ARN: !Ref EscalationTopic
          INCIDENTS_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-IncidentsTableName
          WORKFLOW_STATE_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-WorkflowStateTableName
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          from datetime import datetime, timezone

          sns = boto3.client('sns')
          dynamodb = boto3.resource('dynamodb')

          ALERT_TOPIC = os.environ.get('ALERT_TOPIC_ARN', '')
          ESCALATION_TOPIC = os.environ.get('ESCALATION_TOPIC_ARN', '')
          INCIDENTS_TABLE = os.environ.get('INCIDENTS_TABLE', 'outageshield-incidents-dev')

          def lambda_handler(event, context):
              signal = event.get('signal', {})
              incident_id = signal.get('signal_id', '')
              service = signal.get('service', 'unknown')

              # Get data from previous steps
              step2 = event.get('step2', {})
              step7 = event.get('step7', {})
              step3 = event.get('step3', {})

              severity = step2.get('severity_score', 4)
              revenue = step2.get('revenue_at_risk', 'Unknown')
              affected_users = step2.get('affected_users', 0)
              ticket_id = step7.get('ticket_id', 'N/A')
              ticket_url = step7.get('ticket_url', '')
              root_cause = step7.get('root_cause', '')

              if not root_cause:
                  root_causes = step3.get('root_causes', [])
                  root_cause = root_causes[0].get('description', 'Under investigation') if root_causes else 'Under investigation'

              alarm_name = signal.get('alarm_name', f'Incident on {service}')

              # Build detailed SNS message
              subject = f"[OutageShield] SEV-{severity} | {service} | {alarm_name}"

              message = f"""OutageShield AI - Incident Alert
              ==================================================

              Service:         {service}
              Severity:        SEV-{severity}
              Incident ID:     {incident_id}
              Alarm:           {alarm_name}
              Detected:        {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')}

              Root Cause:      {root_cause}
              Revenue at Risk: {revenue}
              Affected Users:  {affected_users}

              Jira Ticket:     {ticket_id}
              Ticket URL:      {ticket_url}

              Dashboard:       https://d2k1km1tzlio49.cloudfront.net/incidents/{incident_id}

              ==================================================
              Action Required: Review incident and approve remediation.
              """

              # Send SNS
              topic = ESCALATION_TOPIC if int(severity) >= 4 else ALERT_TOPIC
              notif_type = 'escalation' if int(severity) >= 4 else 'alert'

              try:
                  if topic:
                      sns.publish(TopicArn=topic, Subject=subject[:100], Message=message)
                      print(f"SNS sent to {notif_type} topic for {incident_id}")
              except Exception as e:
                  print(f"SNS publish failed: {e}")

              # Store notification record in DynamoDB
              notification = {
                  'type': notif_type,
                  'channel': 'SNS',
                  'status': 'sent',
                  'recipient': 'sre-team@shopsphere.com',
                  'subject': subject[:100],
                  'message': message,
                  'sent_at': datetime.now(timezone.utc).isoformat(),
                  'ticket_id': ticket_id,
                  'ticket_url': ticket_url
              }

              try:
                  table = dynamodb.Table(INCIDENTS_TABLE)
                  table.update_item(
                      Key={'incident_id': incident_id},
                      UpdateExpression='SET notifications = :n, workflow_step = :ws',
                      ExpressionAttributeValues={
                          ':n': json.dumps(notification),
                          ':ws': 'notified'
                      }
                  )
              except Exception as e:
                  print(f"DynamoDB notification store failed: {e}")

              return {'statusCode': 200, 'notification': notification}

  # ─────────────────────────────────────────────────────────────────────────────
  # Ticket Integrator Lambda — Real Jira API integration
  # ─────────────────────────────────────────────────────────────────────────────
  TicketIntegratorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub outageshield-ticket-integrator-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: TicketPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                Resource: '*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:outageshield/*

  TicketIntegratorLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub outageshield-ticket-integrator-${Environment}
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt TicketIntegratorRole.Arn
      Timeout: 60
      MemorySize: 256
      TracingConfig:
        Mode: Active
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          INCIDENTS_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-IncidentsTableName
          WORKFLOW_STATE_TABLE: !ImportValue
            Fn::Sub: outageshield-storage-${Environment}-WorkflowStateTableName
          JIRA_SECRET: outageshield/jira-credentials
          DASHBOARD_URL: https://d2k1km1tzlio49.cloudfront.net
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          import urllib.request
          import urllib.error
          import base64
          from datetime import datetime, timezone

          dynamodb = boto3.resource('dynamodb')
          sm = boto3.client('secretsmanager')

          INCIDENTS_TABLE = os.environ.get('INCIDENTS_TABLE', 'outageshield-incidents-dev')
          SECRET_NAME = os.environ.get('JIRA_SECRET', 'outageshield/jira-credentials')
          DASHBOARD_URL = os.environ.get('DASHBOARD_URL', 'https://d2k1km1tzlio49.cloudfront.net')

          def lambda_handler(event, context):
              signal = event.get('signal', {})
              incident_id = signal.get('signal_id', '')
              service = signal.get('service', 'unknown')

              step2 = event.get('step2', {})
              step3 = event.get('step3', {})
              severity = step2.get('severity_score', 4)
              biz_impact = step2.get('business_impact_score', 5)
              revenue = step2.get('revenue_at_risk', 'Unknown')
              affected_users = step2.get('affected_users', 0)
              sla_status = step2.get('sla_status', 'Unknown')

              root_causes = step3.get('root_causes', [])
              top_rc = root_causes[0].get('description', 'Under investigation') if root_causes else 'Under investigation'
              confidence = root_causes[0].get('confidence', 0) if root_causes else 0

              # Get Jira credentials
              try:
                  secret = sm.get_secret_value(SecretId=SECRET_NAME)
                  creds = json.loads(secret['SecretString'])
                  jira_url = creds['jira_url']
                  project_key = creds['project_key']
                  email = creds['email']
                  api_token = creds['api_token']
              except Exception as e:
                  print(f"Failed to get Jira credentials: {e}")
                  return create_fallback(incident_id, service, severity, top_rc, revenue)

              alarm_name = signal.get('alarm_name', f'Incident on {service}')
              reason = signal.get('reason', 'Anomaly detected')

              summary = f"[OutageShield] SEV-{severity} | {service} | {alarm_name}"
              description = f"h2. Incident Details\\n||Field||Value||\\n|Incident ID|{incident_id}|\\n|Service|{service}|\\n|Severity|SEV-{severity}|\\n|Business Impact|{biz_impact}/10|\\n|Revenue at Risk|{revenue}|\\n|Affected Users|{affected_users}|\\n|SLA Status|{sla_status}|\\n\\nh2. Root Cause Analysis\\n*Confidence:* {confidence}%\\n{top_rc}\\n\\nh2. Alarm\\n*Alarm:* {alarm_name}\\n*Reason:* {reason}\\n\\nh2. OutageShield Dashboard\\n[View Incident in Dashboard|{DASHBOARD_URL}/incidents/{incident_id}]\\n\\n----\\n_Auto-generated by OutageShield AI Agent_"

              priority_map = {5: 'Highest', 4: 'High', 3: 'Medium', 2: 'Low', 1: 'Lowest'}
              priority = priority_map.get(severity, 'High')

              dashboard_link = f"{DASHBOARD_URL}/incidents/{incident_id}"

              desc_content = [
                  {"type": "heading", "attrs": {"level": 2}, "content": [{"type": "text", "text": "Incident Details"}]},
                  {"type": "table", "content": [
                      {"type": "tableRow", "content": [{"type": "tableHeader", "content": [{"type": "paragraph", "content": [{"type": "text", "text": "Field"}]}]}, {"type": "tableHeader", "content": [{"type": "paragraph", "content": [{"type": "text", "text": "Value"}]}]}]},
                      {"type": "tableRow", "content": [{"type": "tableCell", "content": [{"type": "paragraph", "content": [{"type": "text", "text": "Incident ID"}]}]}, {"type": "tableCell", "content": [{"type": "paragraph", "content": [{"type": "text", "text": incident_id}]}]}]},
                      {"type": "tableRow", "content": [{"type": "tableCell", "content": [{"type": "paragraph", "content": [{"type": "text", "text": "Service"}]}]}, {"type": "tableCell", "content": [{"type": "paragraph", "content": [{"type": "text", "text": service}]}]}]},
                      {"type": "tableRow", "content": [{"type": "tableCell", "content": [{"type": "paragraph", "content": [{"type": "text", "text": "Severity"}]}]}, {"type": "tableCell", "content": [{"type": "paragraph", "content": [{"type": "text", "text": f"SEV-{severity}"}]}]}]},
                      {"type": "tableRow", "content": [{"type": "tableCell", "content": [{"type": "paragraph", "content": [{"type": "text", "text": "Revenue at Risk"}]}]}, {"type": "tableCell", "content": [{"type": "paragraph", "content": [{"type": "text", "text": str(revenue)}]}]}]},
                      {"type": "tableRow", "content": [{"type": "tableCell", "content": [{"type": "paragraph", "content": [{"type": "text", "text": "Affected Users"}]}]}, {"type": "tableCell", "content": [{"type": "paragraph", "content": [{"type": "text", "text": str(affected_users)}]}]}]},
                      {"type": "tableRow", "content": [{"type": "tableCell", "content": [{"type": "paragraph", "content": [{"type": "text", "text": "SLA Status"}]}]}, {"type": "tableCell", "content": [{"type": "paragraph", "content": [{"type": "text", "text": str(sla_status)}]}]}]}
                  ]},
                  {"type": "heading", "attrs": {"level": 2}, "content": [{"type": "text", "text": "Root Cause Analysis"}]},
                  {"type": "paragraph", "content": [{"type": "text", "text": f"Confidence: {confidence}%", "marks": [{"type": "strong"}]}]},
                  {"type": "paragraph", "content": [{"type": "text", "text": top_rc}]},
                  {"type": "heading", "attrs": {"level": 2}, "content": [{"type": "text", "text": "Alarm"}]},
                  {"type": "paragraph", "content": [{"type": "text", "text": f"Alarm: {alarm_name}", "marks": [{"type": "strong"}]}]},
                  {"type": "paragraph", "content": [{"type": "text", "text": f"Reason: {reason}"}]},
                  {"type": "heading", "attrs": {"level": 2}, "content": [{"type": "text", "text": "OutageShield Dashboard"}]},
                  {"type": "paragraph", "content": [{"type": "text", "text": "View Incident in Dashboard: "}, {"type": "text", "text": dashboard_link, "marks": [{"type": "link", "attrs": {"href": dashboard_link}}]}]},
                  {"type": "rule"},
                  {"type": "paragraph", "content": [{"type": "text", "text": "Auto-generated by OutageShield AI Agent", "marks": [{"type": "em"}]}]}
              ]

              issue_data = {"fields": {"project": {"key": project_key}, "summary": summary[:255], "description": {"type": "doc", "version": 1, "content": desc_content}, "issuetype": {"name": "Task"}, "priority": {"name": priority}}}

              try:
                  url = f"{jira_url}/rest/api/3/issue"
                  data = json.dumps(issue_data).encode('utf-8')
                  auth_bytes = base64.b64encode(f"{email}:{api_token}".encode()).decode()
                  req = urllib.request.Request(url, data=data, method='POST')
                  req.add_header('Content-Type', 'application/json')
                  req.add_header('Authorization', f'Basic {auth_bytes}')
                  response = urllib.request.urlopen(req)
                  result = json.loads(response.read().decode())
                  ticket_id = result.get('key', 'UNKNOWN')
                  ticket_url = f"{jira_url}/browse/{ticket_id}"
                  print(f"Jira ticket created: {ticket_id}")
              except Exception as e:
                  print(f"Jira error: {e}")
                  ticket_id = f"TGSHLD-ERR-{incident_id[:6]}"
                  ticket_url = f"{jira_url}/browse/{ticket_id}"

              # Store in DynamoDB
              dashboard_link = f"{DASHBOARD_URL}/incidents/{incident_id}"
              ticket_content = json.dumps({'summary': summary, 'description': f"Service: {service}\\nSeverity: SEV-{severity}\\nRoot Cause: {top_rc}\\nRevenue: {revenue}\\nDashboard: {dashboard_link}", 'priority': priority, 'url': ticket_url, 'dashboard_url': dashboard_link, 'created_at': datetime.now(timezone.utc).isoformat()})
              try:
                  table = dynamodb.Table(INCIDENTS_TABLE)
                  table.update_item(
                      Key={'incident_id': incident_id},
                      UpdateExpression='SET ticket_id = :tid, ticket_system = :ts, ticket_status = :tst, ticket_url = :tu, ticket_content = :tc, workflow_step = :ws',
                      ExpressionAttributeValues={':tid': ticket_id, ':ts': 'Jira', ':tst': 'Open', ':tu': ticket_url, ':tc': ticket_content, ':ws': 'ticket_created'}
                  )
              except Exception as e:
                  print(f"DynamoDB failed: {e}")

              return {'statusCode': 200, 'ticket_id': ticket_id, 'ticket_url': ticket_url, 'system': 'Jira', 'severity': severity, 'root_cause': top_rc}

          def create_fallback(incident_id, service, severity, root_cause, revenue):
              ticket_id = f"OPS-{incident_id[:8].upper()}"
              ticket_url = f"https://corpinfollc.atlassian.net/browse/{ticket_id}"
              try:
                  table = dynamodb.Table(INCIDENTS_TABLE)
                  table.update_item(
                      Key={'incident_id': incident_id},
                      UpdateExpression='SET ticket_id = :tid, ticket_system = :ts, ticket_status = :tst, ticket_url = :tu, workflow_step = :ws',
                      ExpressionAttributeValues={':tid': ticket_id, ':ts': 'Jira', ':tst': 'Open', ':tu': ticket_url, ':ws': 'ticket_created'}
                  )
              except Exception as e:
                  print(f"Fallback failed: {e}")
              return {'statusCode': 200, 'ticket_id': ticket_id, 'ticket_url': ticket_url, 'system': 'Jira', 'severity': severity, 'root_cause': root_cause}

  # ─────────────────────────────────────────────────────────────────────────────
  # Log Groups
  # ─────────────────────────────────────────────────────────────────────────────
  NotificationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/outageshield-notification-${Environment}
      RetentionInDays: !Ref RetentionDays

  TicketIntegratorLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/lambda/outageshield-ticket-integrator-${Environment}
      RetentionInDays: !Ref RetentionDays

Outputs:
  IncidentAlertTopicArn:
    Value: !Ref IncidentAlertTopic
    Export:
      Name: !Sub outageshield-notifications-${Environment}-TopicArn

  EscalationTopicArn:
    Value: !Ref EscalationTopic
    Export:
      Name: !Sub outageshield-notifications-${Environment}-EscalationTopicArn

  NotificationLambdaArn:
    Value: !GetAtt NotificationLambda.Arn
    Export:
      Name: !Sub outageshield-notifications-${Environment}-LambdaArn

  TicketIntegratorLambdaArn:
    Value: !GetAtt TicketIntegratorLambda.Arn
    Export:
      Name: !Sub outageshield-notifications-${Environment}-TicketLambdaArn
